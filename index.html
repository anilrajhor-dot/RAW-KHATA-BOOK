<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>SmartRWA — Society Register</title>
<link rel="manifest" href="data:application/json;base64,eyJuYW1lIjoiU21hcnRSV0EiLCJzaG9ydF9uYW1lIjoiU21hcnRSV0EiLCJzdGFydF91cmwiOiIuIiwiZGlzcGxheSI6InN0YW5kYWxvbmUiLCJiYWNrZ3JvdW5kX2NvbG9yIjoiI0VERUJFMyIsInRoZW1lX2NvbG9yIjoiIzBFNUM1NiJ9">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Zilla+Slab:wght@500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#EDEBE3; --paper-dark:#1B1F1C;
  --surface:#FFFFFF; --surface-dark:#242923;
  --border:#D8D3C4; --border-dark:#3A4038;
  --ink:#232A25; --ink-dark:#E7E5DC;
  --ink-soft:#6B6A5F; --ink-soft-dark:#9B9C90;
  --teal:#0E5C56; --teal-dark:#3EA89B;
  --brick:#9C3B2E; --brick-soft:#F3E1DC;
  --moss:#4B6B3A; --moss-soft:#E3EBDB;
  --gold:#B08D2F;
  --amber-soft:#F6EBD2;
  --radius:10px;
  --shadow:0 1px 2px rgba(35,42,37,0.06), 0 2px 8px rgba(35,42,37,0.05);
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
body{margin:0; font-family:'Inter',sans-serif; background:var(--paper); color:var(--ink); transition:background .25s,color .25s;}
body.dark{background:var(--paper-dark); color:var(--ink-dark);}
h1,h2,h3,.disp{font-family:'Zilla Slab',serif;}
.mono{font-family:'IBM Plex Mono',monospace;}
button{font-family:inherit; cursor:pointer;}
::selection{background:var(--gold); color:#fff;}

/* App shell */
#app{display:flex; min-height:100vh;}
#sidebar{
  width:84px; flex:0 0 84px; background:var(--teal); color:#F2F0E6;
  display:flex; flex-direction:column; align-items:center; padding:14px 0; gap:2px;
  position:sticky; top:0; height:100vh; overflow-y:auto;
}
.side-logo{font-family:'Zilla Slab',serif; font-weight:700; font-size:20px; letter-spacing:.5px; margin-bottom:14px; writing-mode:horizontal-tb;}
.tab{
  width:100%; padding:11px 4px; text-align:center; font-size:10.5px; font-weight:600;
  color:#CFE3DF; border:none; background:transparent; position:relative; letter-spacing:.3px;
  border-left:3px solid transparent; line-height:1.25;
}
.tab .ic{display:block; font-size:18px; margin-bottom:3px;}
.tab.active{background:rgba(255,255,255,0.1); color:#fff; border-left:3px solid var(--gold);}
.tab:active{background:rgba(255,255,255,0.18);}

#main{flex:1; min-width:0; display:flex; flex-direction:column;}
#topbar{
  background:var(--surface); border-bottom:1px solid var(--border); padding:14px 18px;
  display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:5;
}
body.dark #topbar{background:var(--surface-dark); border-color:var(--border-dark);}
#topbar h1{font-size:18px; margin:0; font-weight:600;}
#topbar .soc{font-size:11.5px; color:var(--ink-soft); font-family:'Inter';}
.top-actions{display:flex; gap:8px; align-items:center;}
.icon-btn{background:none; border:1px solid var(--border); border-radius:8px; padding:7px 9px; font-size:15px; color:var(--ink);}
body.dark .icon-btn{border-color:var(--border-dark); color:var(--ink-dark);}

#content{padding:16px; padding-bottom:70px; max-width:980px; margin:0 auto; width:100%;}

/* Cards & sections */
.card{background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:16px; margin-bottom:14px; box-shadow:var(--shadow);}
body.dark .card{background:var(--surface-dark); border-color:var(--border-dark);}
.section-title{font-size:15px; font-weight:700; margin:0 0 12px; display:flex; align-items:center; justify-content:space-between;}
.section-title .num{color:var(--gold); font-family:'IBM Plex Mono'; font-size:12px; margin-right:6px;}

/* Dashboard grid */
.stat-grid{display:grid; grid-template-columns:repeat(2,1fr); gap:10px; margin-bottom:14px;}
.stat{background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:14px; box-shadow:var(--shadow);}
body.dark .stat{background:var(--surface-dark); border-color:var(--border-dark);}
.stat .lbl{font-size:11px; color:var(--ink-soft); text-transform:uppercase; letter-spacing:.5px; font-weight:600;}
.stat .val{font-family:'IBM Plex Mono'; font-size:22px; font-weight:600; margin-top:4px;}
.stat.alert .val{color:var(--brick);}
.stat.good .val{color:var(--moss);}

/* Tables - ledger ruled style */
table{width:100%; border-collapse:collapse; font-size:13px;}
th{text-align:left; font-size:10.5px; text-transform:uppercase; letter-spacing:.4px; color:var(--ink-soft); padding:7px 8px; border-bottom:2px solid var(--ink); font-weight:700;}
td{padding:8px; border-bottom:1px solid var(--border); vertical-align:top;}
body.dark td{border-color:var(--border-dark);}
tr:hover td{background:rgba(14,92,86,0.04);}
.num-cell{font-family:'IBM Plex Mono'; text-align:right; white-space:nowrap;}
.tbl-wrap{overflow-x:auto; -webkit-overflow-scrolling:touch;}

/* Stamps */
.stamp{
  display:inline-block; padding:2px 9px; border-radius:3px; font-size:10.5px; font-weight:700;
  letter-spacing:.6px; text-transform:uppercase; border:1.5px solid currentColor; transform:rotate(-2deg);
  font-family:'IBM Plex Mono';
}
.stamp.paid{color:var(--moss); background:var(--moss-soft);}
.stamp.due{color:var(--gold); background:var(--amber-soft);}
.stamp.overdue{color:var(--brick); background:var(--brick-soft);}
.stamp.open{color:var(--brick); background:var(--brick-soft);}
.stamp.progress{color:var(--gold); background:var(--amber-soft);}
.stamp.closed{color:var(--moss); background:var(--moss-soft);}

/* Buttons */
.btn{border-radius:8px; padding:10px 16px; font-weight:600; font-size:13.5px; border:1px solid transparent;}
.btn-primary{background:var(--teal); color:#fff;}
.btn-primary:active{background:#0a4642;}
.btn-outline{background:transparent; border:1px solid var(--border); color:var(--ink);}
body.dark .btn-outline{border-color:var(--border-dark); color:var(--ink-dark);}
.btn-danger{background:transparent; color:var(--brick); border:1px solid var(--brick);}
.btn-block{width:100%;}
.btn-sm{padding:6px 10px; font-size:12px; border-radius:6px;}
.fab{
  position:fixed; right:18px; bottom:22px; width:54px; height:54px; border-radius:50%;
  background:var(--teal); color:#fff; font-size:26px; border:none; box-shadow:0 4px 14px rgba(0,0,0,0.25); z-index:20;
}

/* Forms */
.field{margin-bottom:12px;}
.field label{display:block; font-size:11.5px; font-weight:600; color:var(--ink-soft); margin-bottom:5px; text-transform:uppercase; letter-spacing:.3px;}
input,select,textarea{
  width:100%; padding:10px 11px; border:1px solid var(--border); border-radius:8px; font-size:14.5px;
  font-family:'Inter'; background:var(--surface); color:var(--ink);
}
body.dark input, body.dark select, body.dark textarea{background:var(--surface-dark); border-color:var(--border-dark); color:var(--ink-dark);}
.row2{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
.tag-row{display:flex; gap:8px; flex-wrap:wrap; margin-bottom:10px;}
.tag-btn{border:1px solid var(--border); background:transparent; border-radius:20px; padding:7px 13px; font-size:12.5px; color:var(--ink-soft); font-weight:600;}
.tag-btn.active{background:var(--teal); color:#fff; border-color:var(--teal);}
body.dark .tag-btn{border-color:var(--border-dark); color:var(--ink-soft-dark);}

/* Modal */
.modal-bg{position:fixed; inset:0; background:rgba(20,20,15,0.5); z-index:50; display:none; align-items:flex-end; justify-content:center;}
.modal-bg.show{display:flex;}
.modal{background:var(--surface); width:100%; max-width:560px; max-height:90vh; overflow-y:auto; border-radius:16px 16px 0 0; padding:18px; animation:slideup .22s ease;}
body.dark .modal{background:var(--surface-dark);}
@media(min-width:640px){ .modal-bg{align-items:center;} .modal{border-radius:14px;} }
@keyframes slideup{from{transform:translateY(30px); opacity:0;} to{transform:translateY(0); opacity:1;}}
.modal-head{display:flex; justify-content:space-between; align-items:center; margin-bottom:14px;}
.modal-head h2{font-size:17px; margin:0;}
.close-x{background:none; border:none; font-size:22px; color:var(--ink-soft); line-height:1;}

.empty{text-align:center; padding:36px 14px; color:var(--ink-soft);}
.empty .ic{font-size:34px; margin-bottom:8px;}

.divider{border:none; border-top:1px dashed var(--border); margin:14px 0;}
body.dark .divider{border-color:var(--border-dark);}

.pill-list{display:flex; flex-wrap:wrap; gap:6px; margin-top:6px;}
.pill{background:var(--paper); border:1px solid var(--border); border-radius:6px; padding:3px 8px; font-size:11.5px; font-family:'IBM Plex Mono';}
body.dark .pill{background:var(--paper-dark); border-color:var(--border-dark);}

.toast{position:fixed; bottom:90px; left:50%; transform:translateX(-50%); background:var(--ink); color:#fff; padding:10px 18px; border-radius:20px; font-size:13px; z-index:80; opacity:0; transition:opacity .25s; pointer-events:none;}
.toast.show{opacity:1;}

.bar-chart{display:flex; align-items:flex-end; gap:8px; height:120px; padding-top:10px;}
.bar-col{flex:1; display:flex; flex-direction:column; align-items:center; justify-content:flex-end; height:100%;}
.bar{width:100%; background:var(--teal); border-radius:4px 4px 0 0; min-height:2px;}
.bar-label{font-size:9.5px; color:var(--ink-soft); margin-top:5px; font-family:'IBM Plex Mono';}

.subtabs{display:flex; gap:6px; overflow-x:auto; margin-bottom:14px; padding-bottom:2px;}
.subtab{flex:0 0 auto; padding:8px 14px; border-radius:8px; border:1px solid var(--border); background:var(--surface); font-size:12.5px; font-weight:600; color:var(--ink-soft);}
.subtab.active{background:var(--ink); color:#fff; border-color:var(--ink);}
body.dark .subtab{background:var(--surface-dark); border-color:var(--border-dark);}
body.dark .subtab.active{background:var(--teal-dark); color:#111; border-color:var(--teal-dark);}

@media(max-width:640px){
  #sidebar{width:60px; flex-basis:60px;}
  .tab{font-size:9px; padding:9px 2px;}
  .tab .ic{font-size:16px;}
  .stat-grid{grid-template-columns:1fr 1fr;}
  #content{padding:12px;}
}

/* Lock screen */
#lockscreen{
  min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px;
  background:var(--paper);
}
body.dark #lockscreen{background:var(--paper-dark);}
.lock-card{background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:26px 22px; max-width:380px; width:100%; box-shadow:var(--shadow);}
body.dark .lock-card{background:var(--surface-dark); border-color:var(--border-dark);}
.lock-card h1{font-size:20px; margin:0 0 3px;}
.lock-sub{font-size:12.5px; color:var(--ink-soft); margin-bottom:18px;}
.role-grid{display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; margin-bottom:16px;}
.role-opt{border:1.5px solid var(--border); background:var(--paper); border-radius:9px; padding:12px 4px; text-align:center; font-size:12px; font-weight:600; color:var(--ink);}
body.dark .role-opt{border-color:var(--border-dark); background:var(--paper-dark); color:var(--ink-dark);}
.role-opt.active{border-color:var(--teal); background:var(--teal); color:#fff;}
.lock-err{color:var(--brick); font-size:12.5px; margin-top:8px; min-height:16px;}
.role-badge{
  font-size:10.5px; font-weight:700; text-transform:uppercase; letter-spacing:.4px; color:var(--teal);
  border:1px solid var(--teal); border-radius:20px; padding:3px 10px; font-family:'IBM Plex Mono';
}
body.dark .role-badge{color:var(--teal-dark); border-color:var(--teal-dark);}
.tab-badge{
  position:absolute; top:4px; right:8px; background:var(--brick); color:#fff; font-size:9px; font-weight:700;
  min-width:15px; height:15px; border-radius:8px; display:flex; align-items:center; justify-content:center; padding:0 3px;
}
.stamp.pending{color:var(--gold); background:var(--amber-soft);}
.stamp.approved{color:var(--moss); background:var(--moss-soft);}
.stamp.rejected{color:var(--brick); background:var(--brick-soft);}
.approval-row{border:1px solid var(--border); border-radius:10px; padding:12px; margin-bottom:10px;}
body.dark .approval-row{border-color:var(--border-dark);}
.readonly-note{font-size:11.5px; color:var(--ink-soft); background:var(--paper); border:1px dashed var(--border); border-radius:8px; padding:8px 10px; margin-top:10px;}
body.dark .readonly-note{background:var(--paper-dark); border-color:var(--border-dark);}
</style>
</head>
<body>
<div id="lockscreen" style="display:none">
  <div class="lock-card">
    <h1>SmartRWA — Society Register</h1>
    <div class="lock-sub">Restricted to Accountant, Treasurer & Auditor only.</div>
    <div class="role-grid" id="roleGrid">
      <button class="role-opt active" data-role="Accountant" onclick="selectRole(this)">Accountant</button>
      <button class="role-opt" data-role="Treasurer" onclick="selectRole(this)">Treasurer</button>
      <button class="role-opt" data-role="Auditor" onclick="selectRole(this)">Auditor</button>
    </div>
    <div class="field"><label>PIN</label><input id="lockPin" type="password" inputmode="numeric" placeholder="Enter PIN" onkeydown="if(event.key==='Enter')attemptLogin()"></div>
    <div class="lock-err" id="lockErr"></div>
    <button class="btn btn-primary btn-block" onclick="attemptLogin()">Unlock</button>
    <p style="font-size:10.5px;color:var(--ink-soft);margin-top:12px;">Default PIN is <b>1234</b> for each role on first use — change it under Setup → Access after logging in.</p>
    <p style="font-size:10px;color:var(--ink-soft);margin-top:10px;text-align:center;">Developed by Anil Sharma, Former General Manager, Central Bank of India.</p>
  </div>
</div>
<div id="app" style="display:none">
  <nav id="sidebar"></nav>
  <div id="main">
    <div id="topbar">
      <div>
        <h1 id="pageTitle">Dashboard</h1>
        <div class="soc" id="socName">Society Register</div>
      </div>
      <div class="top-actions">
        <span class="role-badge" id="roleBadge"></span>
        <button class="icon-btn" onclick="openHealthCheckModal()" title="Health Check">♡</button>
        <button class="icon-btn" onclick="toggleTheme()">◐</button>
        <button class="icon-btn" onclick="logout()">⏻</button>
      </div>
    </div>
    <div id="content"></div>
  </div>
</div>
<button class="fab" id="fabBtn" onclick="handleFab()">+</button>
<div class="modal-bg" id="modalBg"><div class="modal" id="modalBody"></div></div>
<div class="toast" id="toast"></div>

<script>
/* ============ STORE ============ */
const DB_KEY='smartrwa_v1';
let DB = load();
function load(){
  try{ const raw = localStorage.getItem(DB_KEY); if(raw) return JSON.parse(raw); }catch(e){}
  return {
    society:{name:'My Housing Society', flatsCount:0},
    flats:[], chargeHeads:defaultCharges(), vouchers:[], bills:[], complaints:[],
    vendors:[], vendorBills:[], employees:[], payrollRuns:[], assets:[], inventoryItems:[], inventoryTx:[],
    seq:{flat:1,bill:1,voucher:1,complaint:1,head:100,vendor:1,vbill:1,emp:1,payroll:1,asset:1,item:1,itx:1},
    security:{pins:{Accountant:'1234',Treasurer:'1234',Auditor:'1234'}}
  };
}
if(!DB.security) DB.security = {pins:{Accountant:'1234',Treasurer:'1234',Auditor:'1234'}};
['vendors','vendorBills','employees','payrollRuns','assets','inventoryItems','inventoryTx','flatTypes','meterReadings','consolidatedBills','towers','mainMeterReadings'].forEach(k=>{ if(!DB[k]) DB[k]=[]; });
if(!DB.seq.tower) DB.seq.tower=1;
if(!DB.seq.mmr) DB.seq.mmr=1;
if(!DB.seq.cbill) DB.seq.cbill=1;
if(!DB.categoryRates) DB.categoryRates = {};
if(!DB.utilityRates) DB.utilityRates = {govtElectricityRate:0, dgSupplyRate:0};
if(!DB.bankAccounts) DB.bankAccounts = [];
if(!DB.seq.bank) DB.seq.bank=1;
DB.flatTypes.forEach(t=>{ if(!t.mode) t.mode='name'; if(t.minArea===undefined) t.minArea=0; if(t.maxArea===undefined) t.maxArea=0; });
Object.assign(DB.seq, {vendor:DB.seq.vendor||1, vbill:DB.seq.vbill||1, emp:DB.seq.emp||1, payroll:DB.seq.payroll||1, asset:DB.seq.asset||1, item:DB.seq.item||1, itx:DB.seq.itx||1, ftype:DB.seq.ftype||1, meter:DB.seq.meter||1});
DB.chargeHeads.forEach(h=>{ if(h.gstApplicable===undefined) h.gstApplicable=false; if(h.gstRate===undefined) h.gstRate=18; if(!h.applicableCategories) h.applicableCategories=[]; });
DB.seq.head = Math.max(DB.seq.head||1, ...DB.chargeHeads.map(h=>h.id), 0) + 1;
DB.flats.forEach(f=>{ if(f.flatTypeId===undefined) f.flatTypeId=''; });
function save(){ localStorage.setItem(DB_KEY, JSON.stringify(DB)); }
function nextId(k){ DB.seq[k]=(DB.seq[k]||0)+1; return DB.seq[k]; }
function defaultCharges(){
  return [
    {id:1,name:'Maintenance',mode:'perArea',rate:3,account:'Maintenance Income',gstApplicable:false,gstRate:18},
    {id:2,name:'Sinking Fund',mode:'perArea',rate:0.5,account:'Sinking Fund',gstApplicable:false,gstRate:18},
    {id:3,name:'Common Area Electricity',mode:'perArea',rate:1,account:'Common Electricity Income',gstApplicable:false,gstRate:18},
    {id:4,name:'Lift Maintenance',mode:'perArea',rate:1,account:'Lift Maintenance Income',gstApplicable:false,gstRate:18},
    {id:5,name:'Water Charges',mode:'meterReading',meterType:'Water',rate:25,account:'Water Income',gstApplicable:false,gstRate:18},
    {id:6,name:'DG Charges',mode:'meterReading',meterType:'DG',rate:18,account:'DG Income',gstApplicable:false,gstRate:18},
    {id:7,name:'Electricity Charges',mode:'meterReading',meterType:'Electricity',rate:9,account:'Electricity Income',gstApplicable:false,gstRate:18},
    {id:8,name:'Parking Charges',mode:'perParking',rate:200,account:'Parking Income',gstApplicable:false,gstRate:18},
  ];
}
const ACCOUNTS = {
  'Cash in Hand':'Asset','Bank Account':'Asset','Maintenance Receivable':'Asset',
  'Fixed Assets':'Asset','Accumulated Depreciation':'Asset','Inventory Stock':'Asset','GST Input Credit':'Asset',
  'Sinking Fund':'Liability','Corpus Fund':'Liability','Security Deposits':'Liability','Vendor Creditors':'Liability','GST Payable':'Liability',
  'PF Payable':'Liability','ESI Payable':'Liability','TDS Payable':'Liability','Opening Balance Equity':'Liability',
  'Maintenance Income':'Income','Water Income':'Income','Parking Income':'Income','Penalty Income':'Income','Other Income':'Income',
  'Common Electricity Income':'Income','Lift Maintenance Income':'Income','DG Income':'Income','Electricity Income':'Income',
  'Housekeeping Expense':'Expense','Security Expense':'Expense','Electricity Expense':'Expense','Repairs & Maintenance':'Expense',
  'Administrative Expense':'Expense','Salaries Expense':'Expense','Water Expense':'Expense',
  'Professional Fees Expense':'Expense','Contractor Payments Expense':'Expense','Rent Expense':'Expense',
  'Employer PF & ESI Expense':'Expense','Depreciation Expense':'Expense'
};
const TDS_SECTIONS = {
  '194C — Contractor':1, '194J — Professional/Technical Fees':10, '194I — Rent':10, '194H — Commission':5, 'None':0
};
const PAYMENT_MODES = ['Cash','UPI','Bank Transfer (NEFT/RTGS/IMPS)','Cheque'];
function modeToAccount(mode){ return mode==='Cash'?'Cash in Hand':'Bank Account'; }
const ACCOUNT_GROUPS = {
  'Cash in Hand':'Current Assets','Bank Account':'Current Assets','Maintenance Receivable':'Current Assets','Inventory Stock':'Current Assets','GST Input Credit':'Current Assets',
  'Fixed Assets':'Fixed Assets','Accumulated Depreciation':'Fixed Assets',
  'Sinking Fund':'Reserves & Funds','Corpus Fund':'Reserves & Funds','Opening Balance Equity':'Reserves & Funds',
  'Security Deposits':'Current Liabilities','Vendor Creditors':'Current Liabilities','GST Payable':'Current Liabilities','PF Payable':'Current Liabilities','ESI Payable':'Current Liabilities','TDS Payable':'Current Liabilities',
  'Maintenance Income':'Operating Income','Water Income':'Operating Income','Parking Income':'Operating Income','Common Electricity Income':'Operating Income','Lift Maintenance Income':'Operating Income','DG Income':'Operating Income','Electricity Income':'Operating Income',
  'Penalty Income':'Other Income','Other Income':'Other Income',
  'Salaries Expense':'Establishment Expenses','Employer PF & ESI Expense':'Establishment Expenses','Administrative Expense':'Establishment Expenses',
  'Housekeeping Expense':'Operating Expenses','Security Expense':'Operating Expenses','Electricity Expense':'Operating Expenses','Repairs & Maintenance':'Operating Expenses','Water Expense':'Operating Expenses','Professional Fees Expense':'Operating Expenses','Contractor Payments Expense':'Operating Expenses','Rent Expense':'Operating Expenses',
  'Depreciation Expense':'Non-Cash Expenses'
};
function groupedRows(accNames, valueFn){
  const groups={};
  accNames.forEach(a=>{ const g=ACCOUNT_GROUPS[a]||'Other'; (groups[g]=groups[g]||[]).push(a); });
  return Object.entries(groups).map(([g,accs])=>{
    const rows = accs.map(a=>({a,v:valueFn(a)})).filter(x=>x.v);
    const subtotal = rows.reduce((s,x)=>s+x.v,0);
    return {group:g, rows, subtotal};
  }).filter(g=>g.rows.length);
}
function bankLedgerName(b){ return `${b.bankName} — ${b.type}${b.accountNumber? ' ×'+b.accountNumber.slice(-4):''}`; }
function syncBankLedgerAccounts(){
  DB.bankAccounts.filter(b=>b.type!=='FD').forEach(b=>{
    if(!b.ledgerAccountName) b.ledgerAccountName = bankLedgerName(b);
    ACCOUNTS[b.ledgerAccountName] = 'Asset';
    ACCOUNT_GROUPS[b.ledgerAccountName] = 'Current Assets';
  });
}
function paymentAccountOptions(){
  syncBankLedgerAccounts();
  const banks = DB.bankAccounts.filter(b=>b.type!=='FD' && b.ledgerAccountName);
  const opts = ['Cash in Hand', ...banks.map(b=>b.ledgerAccountName)];
  if(!banks.length) opts.push('Bank Account');

function fmt(n){ n=Number(n)||0; return n.toLocaleString('en-IN',{maximumFractionDigits:0}); }

function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),1800); }

  return DB.flatTypes.find(t=>t.mode==='sqft' && f.area>0 && f.area>=(t.minArea||0) && f.area<=(t.maxArea||999999999)) || null;
}

    return Number(DB.categoryRates[head.id][category.id]);
  }
  return head.rate;

function apportionShare(cbill, f, period){
  const scoped = cbill.scope==='tower' && cbill.tower;
  if(scoped && f.tower!==cbill.tower) return null;
  const pool = scoped? DB.flats.filter(x=>x.tower===cbill.tower) : DB.flats;
  const scopeLabel = scoped? `Tower ${cbill.tower}` : 'society-wide';
  if(cbill.apportionMethod==='equal'){
    const n = pool.length||1;
    return {share: cbill.totalAmount/n, basis:`1 of ${n} flats (${scopeLabel}, equal share)`, percent: 100/n};
  }
  if(cbill.apportionMethod==='area'){
    const totalArea = (!scoped && DB.society.totalArea)? DB.society.totalArea : pool.reduce((s,x)=>s+(x.area||0),0)||1;
    const percent = (f.area||0)/totalArea*100;
    return {share: cbill.totalAmount*(f.area||0)/totalArea, basis:`${f.area||0} of ${totalArea} sqft (${scopeLabel}) built-up area`, percent};
  }
  if(cbill.apportionMethod==='meterReading'){
    const h = DB.chargeHeads.find(x=>x.id===cbill.chargeHeadId);
    const meterType = h?.meterType;
    const allUnits = pool.reduce((s,x)=>{ const r=DB.meterReadings.find(r=>r.flatId===x.id&&r.meterType===meterType&&r.period===period); return s+(r?Math.max(0,r.current-r.previous):0); },0)||1;
    const r = DB.meterReadings.find(r=>r.flatId===f.id&&r.meterType===meterType&&r.period===period);
    const units = r?Math.max(0,r.current-r.previous):0;
    const percent = units/allUnits*100;
    return {share: cbill.totalAmount*units/allUnits, basis:`${units} of ${allUnits} units metered consumption (${scopeLabel})`, percent};
  }
  return null;
}
function billOutstanding(b){ return b.total - b.paid; }
function flatOutstanding(flatId){
  return DB.bills.filter(b=>b.flatId===flatId).reduce((s,b)=>s+billOutstanding(b),0);
}
function flatLedgerBalance(flatId, uptoDate){
  let bal=0;
  DB.vouchers.filter(v=>v.flatId===flatId && v.status==='approved' && (!uptoDate || v.date<=uptoDate)).sort((a,b)=>a.date.localeCompare(b.date)).forEach(v=>{
    const rec = v.entries.find(e=>e.account==='Maintenance Receivable'); if(!rec) return;
    bal += (rec.debit||0)-(rec.credit||0);
  });
  return bal;
}
function addVoucher(v){
  v.id = nextId('voucher'); v.date = v.date||todayISO();
  v.status = 'pending'; v.maker = window.__currentRole; v.makerAt = nowTS();

  return v;
}
function accBalance(name, opts){
  let dr=0,cr=0; const upto = opts?.upto, from = opts?.from;
  DB.vouchers.forEach(v=>{
    if(v.status!=='approved') return;
    if(upto && v.date>upto) return;
    if(from && v.date<from) return;
    v.entries.forEach(e=>{ if(e.account===name){ dr+=e.debit||0; cr+=e.credit||0; } });
  });
  return {dr,cr,net:dr-cr};
}
function dayBefore(iso){ const d=new Date(iso); d.setDate(d.getDate()-1); return d.toISOString().slice(0,10); }
function fyStart(){ const d=new Date(); const y = d.getMonth()>=3? d.getFullYear() : d.getFullYear()-1; return `${y}-04-01`; }
function receiptsPaymentsStatement(from, to){
  const cashAccs = ['Cash in Hand','Bank Account'];
  const opening = cashAccs.reduce((s,a)=> s+accBalance(a,{upto:dayBefore(from)}).net, 0);
  const receipts = {}; const payments = {};
  DB.vouchers.filter(v=>v.status==='approved' && v.date>=from && v.date<=to).forEach(v=>{
    cashAccs.forEach(cashAcc=>{
      const e = v.entries.find(x=>x.account===cashAcc); if(!e) return;
      const others = v.entries.filter(x=>x.account!==cashAcc);
      const label = others.length===1? others[0].account : (others.length? `Multiple (${v.type})` : '—');
      if(e.debit>0) receipts[label]=(receipts[label]||0)+e.debit;
      if(e.credit>0) payments[label]=(payments[label]||0)+e.credit;
    });
  });
  const totalReceipts = Object.values(receipts).reduce((s,v)=>s+v,0);
  const totalPayments = Object.values(payments).reduce((s,v)=>s+v,0);
  return {opening, receipts, payments, totalReceipts, totalPayments, closing: opening+totalReceipts-totalPayments};
}

function withdrawVoucher(id){
  if(!canEdit()) return;
  const v = DB.vouchers.find(x=>x.id===id); if(!v) return;
  if(v.status==='approved'){ toast('This entry is already approved — use "Request Deletion" instead.'); return; }
  if(v.status==='pending' && v.maker!==window.__currentRole){ toast('Only the person who raised this can withdraw it before approval.'); return; }
  DB.vouchers = DB.vouchers.filter(x=>x.id!==id);
  if(v.ref){
    DB.bills = DB.bills.filter(b=>b.id!==v.ref);
    DB.vendorBills = DB.vendorBills.filter(b=>b.id!==v.ref);
    if(DB.consolidatedBills) DB.consolidatedBills = DB.consolidatedBills.filter(c=>c.id!==v.ref);
  }
  logAction('Withdraw', `${v.type} voucher #${v.id} withdrawn before posting — ${v.narration||''}`);
  save(); render(); toast('Entry withdrawn');
}
function billHasOtherPayments(v){
  if(!v.ref) return false;
  const bill = DB.bills.find(b=>b.id===v.ref);
  if(bill && bill.paid>0) return true;
  const vb = DB.vendorBills.find(b=>b.id===v.ref);
  if(vb && vb.paid>0) return true;
  return false;
}
function requestDeleteVoucher(id){
  if(!canEdit()) return;
  const v = DB.vouchers.find(x=>x.id===id); if(!v) return;
  if(v.status!=='approved'){ toast('Only approved entries need a deletion request — pending/rejected ones can be withdrawn directly.'); return; }
  if(billHasOtherPayments(v)){ toast('This bill already has payments recorded against it — delete/reverse those receipts first.'); return; }
  const reason = prompt('Reason for requesting deletion (required):');
  if(!reason || !reason.trim()) return;
  v.deleteRequested = true; v.deleteRequestedBy = window.__currentRole; v.deleteRequestedAt = nowTS(); v.deleteReason = reason.trim();
  logAction('Delete Requested', `${v.type} voucher #${v.id} — ${v.narration||''} — reason: ${reason.trim()}`);
  save(); render(); toast('Deletion requested — awaiting a different role to confirm');
}
function cancelDeleteRequest(id){
  if(!canEdit()) return;
  const v = DB.vouchers.find(x=>x.id===id); if(!v) return;
  v.deleteRequested=false; v.deleteRequestedBy=null; v.deleteRequestedAt=null; v.deleteReason='';
  logAction('Delete Request Cancelled', `${v.type} voucher #${v.id} — ${v.narration||''}`);
  save(); render(); toast('Deletion request withdrawn');
}
function confirmDeleteVoucher(id){
  const v = DB.vouchers.find(x=>x.id===id); if(!v) return;
  if(isReadOnly()){ toast('Auditors cannot delete entries — view only.'); return; }
  if(v.deleteRequestedBy===window.__currentRole){ toast('A different role must confirm this deletion.'); return; }
  if(billHasOtherPayments(v)){ toast('This bill now has payments recorded against it — cannot delete safely. Cancel the request and investigate.'); return; }
  reverseApprovalSideEffects(v);
  DB.vouchers = DB.vouchers.filter(x=>x.id!==id);
  logAction('Delete Confirmed', `${v.type} voucher #${v.id} deleted (requested by ${v.deleteRequestedBy}) — ${v.narration||''}`);
  save(); render(); toast('Entry deleted and reversed from the ledger');
}
function applyApprovalSideEffects(v){
  if(v.type==='Receipt' && v.flatId){
    let remaining = v.entries.find(e=>e.debit>0)?.debit||0;
    v.allocations = [];
    DB.bills.filter(b=>b.flatId===v.flatId && billOutstanding(b)>0).sort((a,b)=>a.period.localeCompare(b.period)).forEach(b=>{
      if(remaining<=0) return;
      const due = billOutstanding(b); const alloc = Math.min(due,remaining);
      b.paid += alloc; remaining -= alloc; b.status = billOutstanding(b)<=0?'paid':'partial';
      v.allocations.push({billId:b.id, amount:alloc});
    });
  }
  if(v.type==='VendorPayment' && v.vendorId){
    let remaining = v.entries.find(e=>e.debit>0)?.debit||0;
    v.allocations = [];
    DB.vendorBills.filter(b=>b.vendorId===v.vendorId && (b.netPayable-b.paid)>0).sort((a,b)=>a.date.localeCompare(b.date)).forEach(b=>{
      if(remaining<=0) return;
      const due = b.netPayable-b.paid; const alloc=Math.min(due,remaining);
      b.paid += alloc; remaining -= alloc; b.status = (b.netPayable-b.paid)<=0?'paid':'partial';
      v.allocations.push({vendorBillId:b.id, amount:alloc});
    });
  }
  if(v.type==='Payroll' && v.ref){
    const run = DB.payrollRuns.find(r=>r.id===v.ref); if(run) run.status='Processed';
  }
  if(v.type==='Journal' && v.assetRef){
    const a = DB.assets.find(x=>x.id===v.assetRef); if(a) a.posted=true;
  }
}
function reverseApprovalSideEffects(v){
  if(v.type==='Receipt' && v.allocations){
    v.allocations.forEach(a=>{ const b=DB.bills.find(x=>x.id===a.billId); if(b){ b.paid-=a.amount; b.status = billOutstanding(b)<=0?'paid':(b.paid>0?'partial':'unpaid'); } });
  }
  if(v.type==='VendorPayment' && v.allocations){
    v.allocations.forEach(a=>{ const b=DB.vendorBills.find(x=>x.id===a.vendorBillId); if(b){ b.paid-=a.amount; b.status = (b.netPayable-b.paid)<=0?'paid':(b.paid>0?'partial':'unpaid'); } });
  }
  if(v.type==='Payroll' && v.ref){
    const run = DB.payrollRuns.find(r=>r.id===v.ref); if(run) run.status='Cancelled (entry deleted)';
  }
  // Remove the supporting record this voucher created, if any, so nothing dangles with zero accounting effect
  if(v.ref){
    const billIdx = DB.bills.findIndex(b=>b.id===v.ref); if(billIdx>=0) DB.bills.splice(billIdx,1);
    const vbIdx = DB.vendorBills.findIndex(b=>b.id===v.ref); if(vbIdx>=0) DB.vendorBills.splice(vbIdx,1);
    const cbIdx = DB.consolidatedBills? DB.consolidatedBills.findIndex(c=>c.id===v.ref) : -1; if(cbIdx>=0) DB.consolidatedBills.splice(cbIdx,1);
  }
}

/* ============ DASHBOARD ============ */
function renderDashboard(){
  const totalFlats = DB.flats.length;
  const occupied = DB.flats.filter(f=>f.occupancy!=='vacant').length;
  const totalOutstanding = DB.bills.reduce((s,b)=>s+billOutstanding(b),0);
  const thisMonth = todayISO().slice(0,7);
  const monthStart = thisMonth+'-01';
  const collectedThisMonth = DB.vouchers.filter(v=>v.type==='Receipt' && v.date.slice(0,7)===thisMonth)
    .reduce((s,v)=> s+ v.entries.reduce((s2,e)=> s2+(e.debit||0),0)/2 ,0);
  const openComplaints = DB.complaints.filter(c=>c.status!=='Closed').length;
  const billedThisMonth = DB.bills.filter(b=>b.period===thisMonth).reduce((s,b)=>s+b.total,0);

  // Financial snapshot
  const cashBank = accBalance('Cash in Hand').net + accBalance('Bank Account').net;
  const incomeAccs = Object.keys(ACCOUNTS).filter(a=>ACCOUNTS[a]==='Income'), expAccs = Object.keys(ACCOUNTS).filter(a=>ACCOUNTS[a]==='Expense');
  const incomeMTD = incomeAccs.reduce((s,a)=>s+accBalance(a,{from:monthStart,upto:todayISO()}).cr,0);
  const expMTD = expAccs.reduce((s,a)=>s+accBalance(a,{from:monthStart,upto:todayISO()}).dr,0);
  const surplusMTD = incomeMTD-expMTD;
  const collectionEfficiency = billedThisMonth>0? Math.round(collectedThisMonth/billedThisMonth*100) : null;

  // Dues, advances, compliance
  const advancesTotal = DB.flats.reduce((s,f)=>{ const b=flatLedgerBalance(f.id); return s+(b<0?-b:0); },0);
  const vendorDue = DB.vendorBills.reduce((s,b)=>s+(b.netPayable-b.paid),0);
  const pfEsiDue = -accBalance('PF Payable').net + -accBalance('ESI Payable').net;
  const gstDue = -accBalance('GST Payable').net - accBalance('GST Input Credit').net;
  const pendingApprovals = DB.vouchers.filter(v=>v.status==='pending').length;

  // Asset alerts (AMC/warranty due within 30 days or expired)
  const today = todayISO();
  const assetAlerts = DB.assets.filter(a=>{
    const check = d=>{ if(!d) return false; const days=Math.round((new Date(d)-new Date(today))/86400000); return days<=30; };
    return check(a.amcExpiry)||check(a.warrantyExpiry);
  }).length;

  // last 6 months collection
  const months=[]; const d=new Date();
  for(let i=5;i>=0;i--){ const dt=new Date(d.getFullYear(),d.getMonth()-i,1); months.push(dt.toISOString().slice(0,7)); }
  const collByMonth = months.map(m=> DB.vouchers.filter(v=>v.type==='Receipt'&&v.date.slice(0,7)===m).reduce((s,v)=>s+v.entries.reduce((s2,e)=>s2+(e.debit||0),0)/2,0) );
  const maxColl = Math.max(1,...collByMonth);

function csvEscape(v){ v=String(v??''); return /[,"\n]/.test(v)? '"'+v.replace(/"/g,'""')+'"' : v; }
function parseCSVLine(line){
  const out=[]; let cur='', inQ=false;
  for(let i=0;i<line.length;i++){
    const ch=line[i];
    if(inQ){ if(ch==='"'){ if(line[i+1]==='"'){ cur+='"'; i++; } else inQ=false; } else cur+=ch; }
    else { if(ch==='"') inQ=true; else if(ch===','){ out.push(cur); cur=''; } else cur+=ch; }
  }
  out.push(cur);
  return out;
}
function downloadFlatCSVTemplate(){
  const header = ['Tower','FlatNo','FlatType','Area','ParkingSlots','Occupancy','OwnerName','OwnerPhone','OwnerEmail','TenantName'];
  const sampleType = DB.flatTypes[0]?.name || '2 BHK';
  const sample = [
    ['A','101',sampleType,'950','1','owner','Ramesh Kumar','9876543210','ramesh@example.com',''],
    ['A','102',sampleType,'950','1','tenant','Sunita Rao','9876500000','sunita@example.com','Vikram Shah'],
    ['B','201','Villa Type A','2400','2','owner','Anil Mehta','9822011122','anil@example.com',''],
  ];
  const csv = [header, ...sample].map(r=>r.map(csvEscape).join(',')).join('\n');
  const blob = new Blob([csv],{type:'text/csv'}); const url=URL.createObjectURL(blob); const a=document.createElement('a');
  a.href=url; a.download='smartrwa-flats-template.csv'; a.click();
  toast('Template downloaded — fill it in Excel/Sheets and re-upload via Import CSV');
}
function importFlatsCSV(ev){
  if(!canEdit()) return;
  const file = ev.target.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = e=>{
    const lines = e.target.result.split(/\r?\n/).filter(l=>l.trim().length);
    if(!lines.length){ toast('Empty file'); return; }
    const header = parseCSVLine(lines[0]).map(h=>h.trim().toLowerCase());
    const col = name=>header.indexOf(name.toLowerCase());
    const idx = {tower:col('Tower'), flatNo:col('FlatNo'), type:col('FlatType'), area:col('Area'), parking:col('ParkingSlots'), occ:col('Occupancy'), oName:col('OwnerName'), oPhone:col('OwnerPhone'), oEmail:col('OwnerEmail'), tName:col('TenantName')};
    if(idx.flatNo<0){ toast('CSV missing required "FlatNo" column — use the template'); return; }
    let added=0, skipped=0; const errors=[]; const seenInFile=new Set();
    for(let i=1;i<lines.length;i++){
      const cells = parseCSVLine(lines[i]);
      const flatNo = (cells[idx.flatNo]||'').trim();
      const tower = idx.tower>=0? (cells[idx.tower]||'').trim() : '';
      if(!flatNo){ errors.push(`Row ${i+1}: missing FlatNo`); skipped++; continue; }
      const key = tower+'|'+flatNo;
      if(seenInFile.has(key)){ errors.push(`Row ${i+1}: duplicate ${key} within file`); skipped++; continue; }
      if(DB.flats.some(f=>f.tower===tower && f.flatNo===flatNo)){ errors.push(`Row ${i+1}: ${key} already exists — skipped`); skipped++; continue; }
      const area = idx.area>=0? Number(cells[idx.area])||0 : 0;
      if(idx.area>=0 && cells[idx.area] && isNaN(Number(cells[idx.area]))){ errors.push(`Row ${i+1}: invalid Area "${cells[idx.area]}"`); skipped++; continue; }
      const typeName = idx.type>=0? (cells[idx.type]||'').trim() : '';
      const flatType = typeName? DB.flatTypes.find(t=>t.name.toLowerCase()===typeName.toLowerCase()) : null;
      const occRaw = idx.occ>=0? (cells[idx.occ]||'owner').trim().toLowerCase() : 'owner';
      const occupancy = ['owner','tenant','vacant'].includes(occRaw)? occRaw : 'owner';
      seenInFile.add(key);
      DB.seq.flat++;
      DB.flats.push({
        id:'F'+DB.seq.flat, tower, flatNo, flatTypeId: flatType?flatType.id:'', area: area||flatType?.defaultArea||0,
        parkingSlots: idx.parking>=0? Number(cells[idx.parking])||0 : 0, occupancy,
        owner:{name: idx.oName>=0?(cells[idx.oName]||'').trim():'', phone: idx.oPhone>=0?(cells[idx.oPhone]||'').trim():'', email: idx.oEmail>=0?(cells[idx.oEmail]||'').trim():''},
        tenant: idx.tName>=0 && (cells[idx.tName]||'').trim()? {name:(cells[idx.tName]||'').trim()} : null
      });
      added++;
    }
    save();
    logAction('Import', `Flats CSV import — ${added} added, ${skipped} skipped`);
    openModal(`<div class="modal-head"><h2>Import Results</h2><button class="close-x" onclick="closeModal()">×</button></div>
      <div class="stat-grid"><div class="stat good"><div class="lbl">Added</div><div class="val">${added}</div></div><div class="stat ${skipped?'alert':''}"><div class="lbl">Skipped</div><div class="val">${skipped}</div></div></div>
      ${errors.length? `<div class="tbl-wrap"><table><tr><th>Issue</th></tr>${errors.map(e=>`<tr><td style="font-size:12px;">${e}</td></tr>`).join('')}</table></div>` : '<p style="color:var(--moss);font-size:13px;">All rows imported cleanly.</p>'}`);
    render();
  };
  reader.readAsText(file);
  ev.target.value='';
}

function showAutoCategory(){
  const el = document.getElementById('f_autoCat'); if(!el) return;
  const area = Number(document.getElementById('f_area').value)||0;

  if(typeSel){ el.textContent=''; return; }
  const match = DB.flatTypes.find(t=>t.mode==='sqft' && area>0 && area>=(t.minArea||0) && area<=(t.maxArea||999999999));
  el.textContent = match? `Auto-detected category: ${match.name} (${match.minArea}–${match.maxArea} sqft)` : (area>0? 'No matching sqft-range category — will bill at default rates.' : '');
}
function applyFlatType(){
  const typeId = document.getElementById('f_type').value;

function renderConsolidatedBills(){
  const bills = DB.consolidatedBills.slice().sort((a,b)=>b.billDate.localeCompare(a.billDate));
  const liftHead = DB.chargeHeads.find(h=>h.name.toLowerCase().includes('lift'));
  let liftSummary = '';
  if(liftHead){
    const liftBills = DB.consolidatedBills.filter(c=>c.chargeHeadId===liftHead.id);
    if(liftBills.length){
      const byTower = {};

function suggestMMRBill(force){
  const prev = Number(document.getElementById('cb_mmrPrev')?.value)||0;
  const curr = Number(document.getElementById('cb_mmrCurr')?.value)||0;
  const rate = DB.utilityRates.govtElectricityRate||0;
  const billField = document.getElementById('cb_mmrBill');
  if(!billField || !rate || curr<=prev) return;
  if(force || !billField.value) billField.value = Math.round((curr-prev)*rate);
}
function saveConsolidatedBill(){
  if(!canEdit()) return;
  const chargeHeadId = Number(document.getElementById('cb_head').value);
  const period = document.getElementById('cb_period').value;
  const authority = document.getElementById('cb_authority').value.trim();
  const billNumber = document.getElementById('cb_billno').value.trim();
  const billDate = document.getElementById('cb_date').value;
  const scope = document.getElementById('cb_scope').value;
  const tower = scope==='tower'? document.getElementById('cb_tower').value.trim() : '';
  let apportionMethod = document.getElementById('cb_method').value;
  const expAcc = document.getElementById('cb_exp').value;
  const mode = document.getElementById('cb_mode').value;
  const useMMR = document.getElementById('cb_mmr').checked;
  if(scope==='tower' && !tower){ toast('Enter the tower name'); return; }

  let totalAmount = Number(document.getElementById('cb_amt').value);
  let mmrMeta = null;
  if(useMMR){
    const prev = Number(document.getElementById('cb_mmrPrev').value)||0;
    const curr = Number(document.getElementById('cb_mmrCurr').value)||0;
    const billAmt = Number(document.getElementById('cb_mmrBill').value)||0;
    const mainUnits = Math.max(0, curr-prev);
    if(mainUnits<=0 || billAmt<=0){ toast('Enter valid main meter readings and bill amount'); return; }
    const pool = scope==='tower'? DB.flats.filter(f=>f.tower===tower) : DB.flats;
    const subUnits = pool.reduce((s,f)=>{ const r=DB.meterReadings.find(r=>r.flatId===f.id&&r.meterType==='Electricity'&&r.period===period); return s+(r?Math.max(0,r.current-r.previous):0); },0);
    const commonUnits = Math.max(0, mainUnits-subUnits);
    const effectiveRate = billAmt/mainUnits;
    totalAmount = Math.round(commonUnits*effectiveRate);
    apportionMethod = 'area';
    mmrMeta = {mainUnits, subUnits, commonUnits, effectiveRate, billAmount:billAmt};
    DB.mainMeterReadings.push({id:'MMR'+nextId('mmr'), period, previous:prev, current:curr, billAmount:billAmt, scope, tower});
  }
  if(!totalAmount||totalAmount<=0){ toast('Enter a valid total amount'); return; }
  if(DB.consolidatedBills.some(c=>c.chargeHeadId===chargeHeadId && c.period===period && c.scope===scope && (scope!=='tower'||c.tower===tower))){
    toast('A consolidated bill already exists for this charge, period & scope'); return;
  }
  const cbill = {id:'CB'+nextId('cbill'), chargeHeadId, period, authority, billNumber, billDate, totalAmount, apportionMethod, scope, tower, mainMeterCalc:!!useMMR, mmrMeta};
  DB.consolidatedBills.push(cbill);
  addVoucher({type:'Payment', date:billDate, narration:`Consolidated bill — ${authority||'utility'}${billNumber?' #'+billNumber:''}${scope==='tower'?' — Tower '+tower:''} — ${period}`,
    entries:[{account:expAcc,debit:totalAmount,credit:0},{account:modeToAccount(mode),debit:0,credit:totalAmount}]});
  save(); closeModal(); toast('Consolidated bill logged — payment awaits approval'); go('billing','consolidated');
}

function getPrevReading(flatId, meterType, beforePeriod){
  const past = DB.meterReadings.filter(r=>r.flatId===flatId && r.meterType===meterType && r.period<beforePeriod).sort((a,b)=>b.period.localeCompare(a.period));
  return past.length? past[0].current : 0;
}
function drawMeterTable(){
  const type = document.getElementById('mt_type')?.value; const period = document.getElementById('mt_period')?.value;
  if(!type||!period) return;
  const rows = DB.flats.map(f=>{
    const existing = DB.meterReadings.find(r=>r.flatId===f.id && r.meterType===type && r.period===period);
    const prev = existing? existing.previous : getPrevReading(f.id, type, period);
    return `<tr><td>${flatLabel(f)}</td><td class="num-cell">${prev}</td><td><input type="number" class="mt_reading" data-flat="${f.id}" data-prev="${prev}" value="${existing?existing.current:''}" style="width:90px;" ${isReadOnly()?'disabled':''}></td></tr>`;
  }).join('');
  document.getElementById('mt_table').innerHTML = `<div class="tbl-wrap"><table><tr><th>Flat</th><th class="num-cell">Previous</th><th>Current</th></tr>${rows}</table></div>`;

function saveMeterReadings(){
  if(!canEdit()) return;
  const type = document.getElementById('mt_type').value, period = document.getElementById('mt_period').value;
  let count=0;
  document.querySelectorAll('.mt_reading').forEach(inp=>{
    const flatId = inp.dataset.flat, prev = Number(inp.dataset.prev)||0, current = Number(inp.value);
    if(inp.value===''||isNaN(current)) return;
    if(current<prev){ return; }
    const idx = DB.meterReadings.findIndex(r=>r.flatId===flatId && r.meterType===type && r.period===period);
    const rec = {id: idx>=0?DB.meterReadings[idx].id:'MR'+nextId('meter'), flatId, meterType:type, period, previous:prev, current};
    if(idx>=0) DB.meterReadings[idx]=rec; else DB.meterReadings.push(rec);
    count++;
  });
  save(); toast(`${count} reading(s) saved`); logAction('Meter Readings', `${type} readings saved for ${period} (${count} flats)`);

function generateBills(){
  if(!canEdit()) return;
  const period = document.getElementById('gb_period').value;
  const due = document.getElementById('gb_due').value;
  const headIds = Array.from(document.querySelectorAll('.gb_head:checked')).map(x=>Number(x.value));
  const heads = DB.chargeHeads.filter(h=>headIds.includes(h.id));
  if(!period || !heads.length){ toast('Select period & at least one head'); return; }
  let created=0, missingMeter=0;
  DB.flats.forEach(f=>{
    if(DB.bills.some(b=>b.flatId===f.id && b.period===period)) return;
    const {items, missingMeter:mm} = computeBillItems(f, period, heads);
    missingMeter += mm;
    const subTotal = items.reduce((s,i)=>s+i.amount,0), gstTotal = items.reduce((s,i)=>s+i.gst,0);
    const total = subTotal+gstTotal;
    if(total<=0) return;
    const bill = {id:'B'+nextId('bill'), flatId:f.id, period, dueDate:due, items, subTotal, gstTotal, total, paid:0, status:'unpaid'};
    DB.bills.push(bill);
    const entries = [{account:'Maintenance Receivable',debit:total,credit:0}];
    const byAcc = {}; items.forEach(i=>{ byAcc[i.account]=(byAcc[i.account]||0)+i.amount; });
    Object.entries(byAcc).forEach(([acc,amt])=> entries.push({account:acc,debit:0,credit:amt}));
    if(gstTotal>0) entries.push({account:'GST Payable',debit:0,credit:gstTotal});
    addVoucher({type:'Journal', flatId:f.id, date:due||todayISO(), narration:`Maintenance bill ${flatLabel(f)} — ${period}`, entries, ref:bill.id});
    created++;
  });
  save(); closeModal();
  toast(`${created} bill(s) generated${missingMeter?' — '+missingMeter+' charge(s) skipped for missing meter readings':''}`);
  render();
}
function computeBillItems(f, period, heads){
  let missingMeter=0;
  const category = getFlatCategory(f);
  const items = heads.map(h=>{
    if(h.applicableCategories && h.applicableCategories.length){
      if(!category || !h.applicableCategories.includes(category.id)) return null;
    }
    let amt=0, units, consolidated=null;
    const cbill = DB.consolidatedBills.find(c=>c.chargeHeadId===h.id && c.period===period && (c.scope!=='tower' || c.tower===f.tower));
    if(cbill){
      if(h.mode==='meterReading' || cbill.apportionMethod==='meterReading'){
        const reading = DB.meterReadings.find(r=>r.flatId===f.id && r.meterType===h.meterType && r.period===period);
        if(!reading){ missingMeter++; return null; }
        units = Math.max(0, reading.current-reading.previous);
      }
      const ap = apportionShare(cbill, f, period);
      if(!ap) return null;
      amt = ap.share;
      consolidated = {billNumber:cbill.billNumber, authority:cbill.authority, billDate:cbill.billDate, totalAmount:cbill.totalAmount, apportionMethod:cbill.apportionMethod, basis:ap.basis, percent:ap.percent};
    } else {
      const rate = categoryRate(h, category);
      if(h.mode==='perArea') amt = (f.area||0)*rate;
      else if(h.mode==='perParking') amt = (f.parkingSlots||0)*rate;
      else if(h.mode==='meterReading'){
        const reading = DB.meterReadings.find(r=>r.flatId===f.id && r.meterType===h.meterType && r.period===period);
        if(!reading){ missingMeter++; return null; }
        units = Math.max(0, reading.current-reading.previous); amt = units*rate;
      }
      else amt = rate;
    }
    const base = Math.round(amt);
    const gst = h.gstApplicable? Math.round(base*(h.gstRate||0)/100) : 0;
    return {head:h.name, account:h.account, amount:base, gst, units, consolidated};
  }).filter(i=>i && (i.amount>0||i.gst>0));
  return {items, missingMeter};
}

function toggleVBStock(){
  const on = document.getElementById('vb_isStock').checked;
  document.getElementById('vb_stockFields').style.display = on? 'block':'none';
  document.getElementById('vb_accField').style.display = on? 'none':'block';
}
function updateVBStockAmount(){
  if(!document.getElementById('vb_isStock').checked) return;
  const qty = Number(document.getElementById('vb_qty')?.value)||0, rate = Number(document.getElementById('vb_rate')?.value)||0;
  if(qty && rate) document.getElementById('vb_amt').value = Math.round(qty*rate);
}
function saveVendorBill(){
  if(!canEdit()) return;
  const vendorId=document.getElementById('vb_vendor').value, description=document.getElementById('vb_desc').value.trim();
  const amount=Number(document.getElementById('vb_amt').value), date=document.getElementById('vb_date').value;
  const isStock = document.getElementById('vb_isStock').checked;
  const expenseAccount = isStock? 'Inventory Stock' : document.getElementById('vb_acc').value;
  const tdsSection=document.getElementById('vb_tds').value;
  const gstOn = document.getElementById('vb_gst').checked, gstRate = gstOn? Number(document.getElementById('vb_gstRate').value)||0 : 0;
  if(!amount||amount<=0){ toast('Enter valid amount'); return; }
  let itemId=null, qty=0;
  if(isStock){
    itemId = document.getElementById('vb_item')?.value; qty = Number(document.getElementById('vb_qty').value)||0;
    if(!itemId || !qty){ toast('Select an item and quantity for this stock purchase'); return; }
  }
  const tdsRate = TDS_SECTIONS[tdsSection]; const tdsAmount = Math.round(amount*tdsRate/100);
  const gstAmount = gstOn? Math.round(amount*gstRate/100) : 0;
  const netPayable = amount+gstAmount-tdsAmount;
  const finalDesc = isStock? (description || `Stock purchase — ${DB.inventoryItems.find(i=>i.id===itemId)?.name||'item'}`) : description;
  const bill = {id:'VB'+nextId('vbill'), vendorId, date, description:finalDesc, amount, tdsSection, tdsRate, tdsAmount, gstAmount, gstRate, netPayable, paid:0, status:'unpaid'};
  DB.vendorBills.push(bill);
  const entries=[{account:expenseAccount,debit:amount,credit:0}];
  if(gstAmount>0) entries.push({account:'GST Input Credit',debit:gstAmount,credit:0});
  entries.push({account:'Vendor Creditors',debit:0,credit:amount+gstAmount-tdsAmount});
  if(tdsAmount>0) entries.push({account:'TDS Payable',debit:0,credit:tdsAmount});
  addVoucher({type:'Journal', vendorId, date, narration:`Vendor bill — ${getVendor(vendorId).name} — ${finalDesc}`, entries, ref:bill.id});
  if(isStock){
    DB.inventoryTx.push({id:'ITX'+nextId('itx'), itemId, date, type:'purchase', qty, rate:Math.round(amount/qty), amount, note:`Vendor: ${getVendor(vendorId).name}`, vendorId});
  }
  save(); closeModal(); toast('Bill logged — posting awaits approval'); go('vendors','bills');
}

  openModal(`

function processPayroll(){
  if(!canEdit()) return;
  const period = document.getElementById('pr_period').value;
  if(!period){ toast('Select period'); return; }
  if(DB.payrollRuns.some(r=>r.period===period)){ toast('Payroll already processed for this period'); return; }
  const items = DB.employees.map(e=>{
    const gross = empGross(e); const pfWage = Math.min(e.basic||0,15000);
    const pfEmp = e.pfApplicable? Math.round(pfWage*0.12):0; const pfEmployer = e.pfApplicable? Math.round(pfWage*0.12):0;
    const esiOk = e.esiApplicable && gross<=21000;
    const esiEmp = esiOk? Math.round(gross*0.0075):0; const esiEmployer = esiOk? Math.round(gross*0.0325):0;
    const netPay = gross-pfEmp-esiEmp;
    return {empId:e.id, gross, pfWage, pfEmp, pfEmployer, esiEmp, esiEmployer, netPay};
  });
  const run = {id:'PR'+nextId('payroll'), period, items, status:'Pending Approval'};
  DB.payrollRuns.push(run);
  const totalGross=items.reduce((s,i)=>s+i.gross,0), totalNet=items.reduce((s,i)=>s+i.netPay,0);
  const totalPFEmp=items.reduce((s,i)=>s+i.pfEmp,0), totalPFEmployer=items.reduce((s,i)=>s+i.pfEmployer,0);
  const totalESIEmp=items.reduce((s,i)=>s+i.esiEmp,0), totalESIEmployer=items.reduce((s,i)=>s+i.esiEmployer,0);
  const entries=[
    {account:'Salaries Expense',debit:totalGross,credit:0},
    {account:'Employer PF & ESI Expense',debit:totalPFEmployer+totalESIEmployer,credit:0},
    {account:'Bank Account',debit:0,credit:totalNet},
    {account:'PF Payable',debit:0,credit:totalPFEmp+totalPFEmployer},
    {account:'ESI Payable',debit:0,credit:totalESIEmp+totalESIEmployer}
  ].filter(e=>e.debit>0||e.credit>0);
  addVoucher({type:'Payroll', ref:run.id, date:todayISO(), narration:`Salary processing — ${period}`, entries});
  save(); closeModal(); toast('Payroll submitted — awaiting checker approval'); go('payroll','runs');
}
function viewPayrollRun(id){
  const run = DB.payrollRuns.find(r=>r.id===id); if(!run) return;
  const rows = run.items.map(i=>{ const e=getEmployee(i.empId); return `<tr><td>${e?e.name:'—'}</td><td class="num-cell">₹${fmt(i.gross)}</td><td class="num-cell">₹${fmt(i.pfEmp)}</td><td class="num-cell">₹${fmt(i.esiEmp)}</td><td class="num-cell">₹${fmt(i.netPay)}</td></tr>`; }).join('');
  openModal(`<div class="modal-head"><h2>Payroll — ${run.period}</h2><button class="close-x" onclick="closeModal()">×</button></div>
  <div class="tbl-wrap"><table><tr><th>Employee</th><th class="num-cell">Gross</th><th class="num-cell">PF</th><th class="num-cell">ESI</th><th class="num-cell">Net</th></tr>${rows}</table></div>

}

/* ============ ASSETS ============ */
function monthsBetween(d1,d2){ const a=new Date(d1),b=new Date(d2); return Math.max(0,(b.getFullYear()-a.getFullYear())*12+(b.getMonth()-a.getMonth())); }
function computeDep(asset, uptoISO){
  if(!asset.usefulLifeYears||asset.usefulLifeYears<=0) return 0;
  const annual = asset.cost/asset.usefulLifeYears; const months = monthsBetween(asset.purchaseDate, uptoISO||todayISO());
  return Math.min(asset.cost, Math.round(annual/12*months));
}
function renderAssets(){
  const today=todayISO();
  const rows = DB.assets.slice().sort((a,b)=>b.purchaseDate.localeCompare(a.purchaseDate)).map(a=>{
    const dep = computeDep(a,today); const wdv = a.cost-dep;
    const warnBadge = (d,label)=>{ if(!d) return ''; const days=Math.round((new Date(d)-new Date(today))/86400000);
      if(days<0) return `<span class="stamp overdue">${label} expired</span>`; if(days<=30) return `<span class="stamp due">${label} due</span>`; return ''; };
    return `<tr onclick="openAssetModal('${a.id}')"><td><b>${a.name}</b><div style="font-size:11px;color:var(--ink-soft)">${a.category} · ${a.purchaseDate}</div></td>
      <td class="num-cell">₹${fmt(a.cost)}</td><td class="num-cell">₹${fmt(wdv)}</td><td>${warnBadge(a.amcExpiry,'AMC')}${warnBadge(a.warrantyExpiry,'Warranty')}</td></tr>`;
  }).join('');
  return `<div class="card"><div class="section-title"><span><span class="num">${String(DB.assets.length).padStart(2,'0')}</span>Asset Register</span>
    ${isReadOnly()?'':'<button class="btn btn-outline btn-sm" onclick="runDepreciation()">Post Depreciation</button>'}</div>
    ${DB.assets.length? `<div class="tbl-wrap"><table><tr><th>Asset</th><th class="num-cell">Cost</th><th class="num-cell">WDV (est.)</th><th>Alerts</th></tr>${rows}</table></div>` : `<div class="empty"><div class="ic">▣</div>No assets registered.</div>`}
  </div>`;
}
function openAssetModal(id){

  if(!id) DB.seq.asset--;
  openModal(`

    <div class="field"><label>Name</label><input id="as_name" value="${a.name}"></div>

    <div class="row2"><div class="field"><label>Purchase Date</label><input id="as_date" type="date" value="${a.purchaseDate}"></div><div class="field"><label>Cost ₹</label><input id="as_cost" type="number" value="${a.cost}"></div></div>
    <div class="row2"><div class="field"><label>Useful Life (yrs)</label><input id="as_life" type="number" value="${a.usefulLifeYears}"></div><div class="field"><label>Vendor</label><input id="as_vendor" value="${a.vendor||''}"></div></div>
    <div class="row2"><div class="field"><label>Warranty Expiry</label><input id="as_warr" type="date" value="${a.warrantyExpiry||''}"></div><div class="field"><label>AMC Expiry</label><input id="as_amc" type="date" value="${a.amcExpiry||''}"></div></div>

function saveAsset(id){
  if(!canEdit()) return;
  const isNew = !DB.assets.some(x=>x.id===id);
  const data={id, name:document.getElementById('as_name').value.trim(), category:document.getElementById('as_cat').value,
    purchaseDate:document.getElementById('as_date').value, cost:Number(document.getElementById('as_cost').value)||0,
    usefulLifeYears:Number(document.getElementById('as_life').value)||1, vendor:document.getElementById('as_vendor').value.trim(),
    warrantyExpiry:document.getElementById('as_warr').value, amcExpiry:document.getElementById('as_amc').value};
  if(!data.name||data.cost<=0){ toast('Enter name & valid cost'); return; }
  if(isNew){
    const mode=document.getElementById('as_pay').value;
    const payAcc = mode==='Cash'?'Cash in Hand':mode==='Credit'?'Vendor Creditors':'Bank Account';
    DB.seq.asset++; DB.assets.push(data);
    addVoucher({type:'Journal', assetRef:data.id, date:data.purchaseDate, narration:`Asset purchase — ${data.name}`,
      entries:[{account:'Fixed Assets',debit:data.cost,credit:0},{account:payAcc,debit:0,credit:data.cost}]});
    toast('Asset added — posting awaits approval');
  } else {
    const idx=DB.assets.findIndex(x=>x.id===id); DB.assets[idx]=data; toast('Asset updated');
  }

function runDepreciation(){
  if(!canEdit()) return;
  const totalComputed = DB.assets.reduce((s,a)=>s+computeDep(a,todayISO()),0);
  const alreadyApproved = -accBalance('Accumulated Depreciation').net;
  const delta = Math.round(totalComputed-alreadyApproved);
  if(delta<=0){ toast('No new depreciation to post'); return; }
  addVoucher({type:'Journal', date:todayISO(), narration:`Depreciation posting — as of ${todayISO()}`,
    entries:[{account:'Depreciation Expense',debit:delta,credit:0},{account:'Accumulated Depreciation',debit:0,credit:delta}]});
  save(); toast(`₹${fmt(delta)} depreciation submitted — awaiting checker approval`); render();
}

        </div>

        ${isReadOnly()? '' : v.deleteRequestedBy===window.__currentRole? `<div class="readonly-note" style="margin-top:8px;">A different role must confirm this — you raised the request.</div><button class="btn btn-outline btn-sm" style="margin-top:8px;" onclick="cancelDeleteRequest(${v.id})">Withdraw Request</button>` : `<div style="display:flex;gap:8px;margin-top:10px;"><button class="btn btn-danger btn-sm" style="flex:1" onclick="confirmDeleteVoucher(${v.id})">Confirm Delete</button><button class="btn btn-outline btn-sm" style="flex:1" onclick="cancelDeleteRequest(${v.id})">Decline</button></div>`}
      </div>`).join('') : `<div class="empty"><div class="ic">✓</div>No deletion requests pending.</div>`;
  } else if(sr==='pending'){
    const pend = DB.vouchers.filter(v=>v.status==='pending').sort((a,b)=>b.id-a.id);
    const actionable = pend.filter(v=>canApprove(v));
    const locked = pend.filter(v=>!canApprove(v));
    const queryBlock = v=> v.queried? `<div style="font-size:11px;background:var(--amber-soft);border-radius:6px;padding:6px 8px;margin-top:8px;">
        <b style="color:var(--gold);">Explanation requested</b> by ${v.queriedBy} on ${new Date(v.queriedAt).toLocaleString('en-IN')}: ${v.queryNote}
        ${v.responseNote? `<div style="margin-top:4px;"><b style="color:var(--moss);">Response</b> from ${v.respondedBy} on ${new Date(v.respondedAt).toLocaleString('en-IN')}: ${v.responseNote}</div>` : ''}
      </div>` : '';
    const rows = actionable.map(v=>`
      <label class="approval-row" style="display:flex;gap:10px;align-items:start;cursor:pointer;">
        <input type="checkbox" class="pend_ck" data-id="${v.id}" onchange="updatePendingCount()" style="width:18px;height:18px;margin-top:2px;flex:0 0 auto;">
        <div style="flex:1;">
          <div style="display:flex;justify-content:space-between;align-items:start;">
            <div><b>${v.type}</b> · ${v.date}<div style="font-size:12px;color:var(--ink-soft)">${v.narration||''}</div></div>
            <div class="num-cell" style="font-weight:700;">₹${fmt(v.entries.reduce((s,e)=>s+(e.debit||0),0))}</div>
          </div>
          <div style="font-size:11px;color:var(--ink-soft);margin-top:6px;">Raised by <b>${v.maker}</b> on ${new Date(v.makerAt).toLocaleString('en-IN')}</div>
          ${queryBlock(v)}
          <div style="display:flex;gap:8px;margin-top:8px;">
            <button class="btn btn-outline btn-sm" style="flex:1" onclick="event.preventDefault();promptQuery(${v.id})">${v.queried?'Query Again':'Call for Explanation'}</button>
            <button class="btn btn-danger btn-sm" style="flex:1" onclick="event.preventDefault();promptReject(${v.id})">Reject</button>
          </div>
        </div>
      </label>`).join('');
    const lockedRows = locked.map(v=>`
      <div class="approval-row" style="opacity:.85;">
        <div style="display:flex;justify-content:space-between;align-items:start;">
          <div><b>${v.type}</b> · ${v.date}<div style="font-size:12px;color:var(--ink-soft)">${v.narration||''}</div></div>
          <div class="num-cell" style="font-weight:700;">₹${fmt(v.entries.reduce((s,e)=>s+(e.debit||0),0))}</div>
        </div>
        <div style="font-size:11px;color:var(--ink-soft);margin-top:6px;">Raised by <b>${v.maker}</b> on ${new Date(v.makerAt).toLocaleString('en-IN')}</div>
        ${queryBlock(v)}
        <div class="readonly-note" style="margin-top:8px;">${isReadOnly()?'Auditors cannot approve — view only.':'You raised this entry — a different role must authorise it.'}</div>
        ${v.queried && v.maker===window.__currentRole && !isReadOnly()? `<button class="btn btn-outline btn-sm" style="margin-top:8px;" onclick="promptRespond(${v.id})">Respond to Query</button>` : ''}
      </div>`).join('');
    body = '';
    if(actionable.length){
      body += `<div style="background:var(--paper);padding:8px 0 10px;margin-bottom:4px;">
        <label style="display:flex;align-items:center;gap:8px;font-weight:600;font-size:13px;margin-bottom:8px;"><input type="checkbox" onchange="toggleSelectAllPending(this)" style="width:16px;height:16px;"> Select all (${actionable.length})</label>
        <button id="authoriseBtn" class="btn btn-primary btn-block" disabled style="opacity:.5;" onclick="authoriseTicked()">Authorise Ticked (0)</button>
      </div>`;
    }
    body += rows + lockedRows;
    if(!pend.length) body = `<div class="empty"><div class="ic">✓</div>Nothing pending approval. All caught up.</div>`;
    else if(!actionable.length) body += `<p style="font-size:12px;color:var(--ink-soft);margin-top:10px;">All pending entries above were raised by you or are locked to your role — nothing here for you to authorise right now.</p>`;
  } else if(sr==='history'){
    const done = DB.vouchers.filter(v=>v.status==='approved'||v.status==='rejected').sort((a,b)=>b.id-a.id).slice(0,100);
    body = done.length? `<div class="tbl-wrap"><table><tr><th>Type</th><th>Maker → Checker</th><th class="num-cell">Amount</th><th>Status</th></tr>
      ${done.map(v=>`<tr><td>${v.type}<div style="font-size:11px;color:var(--ink-soft)">${v.narration||''}</div></td><td style="font-size:12px;">${v.maker} → ${v.checker}${v.checkerNote?'<div style="font-size:11px;color:var(--ink-soft)">'+v.checkerNote+'</div>':''}</td><td class="num-cell">₹${fmt(v.entries.reduce((s,e)=>s+(e.debit||0),0))}</td><td><span class="stamp ${v.status}">${v.status}</span></td></tr>`).join('')}
      </table></div>` : `<div class="empty"><div class="ic">✓</div>No decisions recorded yet.</div>`;
  } else if(sr==='audit'){
    const log = (DB.auditLog||[]).slice().reverse().slice(0,200);
    body = log.length? `<div class="tbl-wrap"><table><tr><th>Time</th><th>Role</th><th>Action</th><th>Detail</th></tr>
      ${log.map(l=>`<tr><td style="font-size:11.5px;white-space:nowrap;">${new Date(l.ts).toLocaleString('en-IN')}</td><td><span class="role-badge" style="font-size:9.5px;">${l.role}</span></td><td>${l.action}</td><td style="font-size:12px;">${l.detail}</td></tr>`).join('')}
      </table></div>` : `<div class="empty"><div class="ic">▦</div>No audit entries yet.</div>`;
  }
  return `<div class="subtabs">${tabs.map(t=>`<button class="subtab ${sr===t[0]?'active':''}" onclick="go('approvals','${t[0]}')">${t[1]}</button>`).join('')}</div>${body}`;
}
function promptReject(id){
  const note = prompt('Reason for rejection (required):');
  if(note===null) return;
  rejectVoucher(id, note.trim());
}
function promptQuery(id){
  const v = DB.vouchers.find(x=>x.id===id); if(!v) return;
  if(!canApprove(v)){ toast('Not permitted'); return; }
  const note = prompt('What needs explaining? (visible to the maker)');
  if(!note || !note.trim()) return;
  v.queried = true; v.queriedBy = window.__currentRole; v.queriedAt = nowTS(); v.queryNote = note.trim();
  v.responseNote=''; v.respondedBy=null; v.respondedAt=null;
  logAction('Query', `${v.type} voucher #${v.id} — explanation requested: ${note.trim()}`);
  save(); render(); toast('Explanation requested from the maker');
}
function promptRespond(id){
  const v = DB.vouchers.find(x=>x.id===id); if(!v) return;
  if(v.maker!==window.__currentRole){ toast('Only the maker can respond to this query'); return; }
  const note = prompt('Your response to the query:');
  if(!note || !note.trim()) return;
  v.responseNote = note.trim(); v.respondedBy = window.__currentRole; v.respondedAt = nowTS();
  logAction('Query Response', `${v.type} voucher #${v.id} — response: ${note.trim()}`);
  save(); render(); toast('Response sent — the checker will review it');
}

/* ============ GST MODULE (returns, ITC & rate management) ============ */
function outwardGSTByPeriod(){
  const byPeriod={};
  DB.bills.forEach(b=>{
    if(!b.gstTotal) return;
    const key = b.period.startsWith('ONE-')? b.dueDate.slice(0,7) : b.period;
    if(!byPeriod[key]) byPeriod[key]={taxable:0,gst:0,byRate:{}};
    byPeriod[key].taxable += b.subTotal; byPeriod[key].gst += b.gstTotal;
    b.items.forEach(i=>{ if(i.gst>0){ const rate = Math.round(i.gst/i.amount*100); const k=rate+'%';
      byPeriod[key].byRate[k]=byPeriod[key].byRate[k]||{taxable:0,gst:0}; byPeriod[key].byRate[k].taxable+=i.amount; byPeriod[key].byRate[k].gst+=i.gst; } });
  });
  return byPeriod;
}
function inwardGSTByPeriod(){
  const byPeriod={};
  DB.vendorBills.forEach(b=>{
    if(!b.gstAmount) return;
    const key = b.date.slice(0,7);
    if(!byPeriod[key]) byPeriod[key]={taxable:0,gst:0};
    byPeriod[key].taxable += b.amount; byPeriod[key].gst += b.gstAmount;
  });
  return byPeriod;
}
function renderGST(){
  const sr = subroute || 'summary';
  const tabs=[['summary','Return Summary'],['outward','Outward (GSTR-1)'],['itc','Input Credit'],['ledger','GST Ledgers']];
  let body='';
  const outward = outwardGSTByPeriod(), inward = inwardGSTByPeriod();
  const allPeriods = [...new Set([...Object.keys(outward),...Object.keys(inward)])].sort().reverse();

  if(sr==='summary'){
    const outputCollected = accBalance('GST Payable').cr - accBalance('GST Payable').dr;
    const itcAvailable = accBalance('GST Input Credit').net;
    const netPayable = outputCollected - itcAvailable;
    body = `<div class="stat-grid" style="margin-bottom:12px;">
        <div class="stat"><div class="lbl">Output GST (collected)</div><div class="val">₹${fmt(outputCollected)}</div></div>
        <div class="stat good"><div class="lbl">Input Tax Credit (ITC)</div><div class="val">₹${fmt(itcAvailable)}</div></div>
        <div class="stat ${netPayable>0?'alert':'good'}"><div class="lbl">${netPayable>=0?'Net GST Payable':'ITC Carried Forward'}</div><div class="val">₹${fmt(Math.abs(netPayable))}</div></div>
      </div>
      <p style="font-size:12px;color:var(--ink-soft);margin-bottom:10px;">Figures reflect <b>approved</b> entries only, in the style of a GSTR-3B summary (Output Tax − Input Tax Credit = Net Payable). This does not file anything — export or copy these figures into your GST portal / CA workflow.</p>
      <div class="tbl-wrap"><table><tr><th>Period</th><th class="num-cell">Outward GST</th><th class="num-cell">Inward GST (ITC)</th><th class="num-cell">Net</th></tr>
      ${allPeriods.map(p=>{ const o=(outward[p]?.gst)||0, i=(inward[p]?.gst)||0; return `<tr><td>${p}</td><td class="num-cell">₹${fmt(o)}</td><td class="num-cell">₹${fmt(i)}</td><td class="num-cell">₹${fmt(o-i)}</td></tr>`; }).join('') || '<tr><td colspan=4 style="color:var(--ink-soft)">No GST activity yet</td></tr>'}
      </table></div>`;
  } else if(sr==='outward'){
    body = `<p style="font-size:12px;color:var(--ink-soft);margin-bottom:10px;">Taxable value and GST charged on resident bills, grouped by period and rate slab — mirrors what GSTR-1 needs for outward supplies.</p>`;
    if(!allPeriods.filter(p=>outward[p]).length) body += `<div class="empty"><div class="ic">%</div>No GST-applicable bills yet.</div>`;
    else allPeriods.filter(p=>outward[p]).forEach(p=>{
      const d = outward[p];
      body += `<div class="approval-row"><b>${p}</b><div class="tbl-wrap" style="margin-top:6px;"><table><tr><th>Rate</th><th class="num-cell">Taxable Value</th><th class="num-cell">GST</th></tr>
        ${Object.entries(d.byRate).map(([rate,v])=>`<tr><td>${rate}</td><td class="num-cell">₹${fmt(v.taxable)}</td><td class="num-cell">₹${fmt(v.gst)}</td></tr>`).join('')}
        <tr style="font-weight:700;"><td>Total</td><td class="num-cell">₹${fmt(d.taxable)}</td><td class="num-cell">₹${fmt(d.gst)}</td></tr></table></div></div>`;
    });
  } else if(sr==='itc'){
    const bills = DB.vendorBills.filter(b=>b.gstAmount>0).sort((a,b)=>b.date.localeCompare(a.date));
    body = `<p style="font-size:12px;color:var(--ink-soft);margin-bottom:10px;">Vendor bills where GST was charged and claimed as Input Tax Credit — reconcile this against your GSTR-2B before claiming.</p>`;
    body += bills.length? `<div class="tbl-wrap"><table><tr><th>Vendor / Bill</th><th class="num-cell">Taxable</th><th class="num-cell">GST</th></tr>
      ${bills.map(b=>{ const v=getVendor(b.vendorId); return `<tr><td>${b.date}<div style="font-size:11px;color:var(--ink-soft)">${v?v.name:'—'}${v?.gstin?' · '+v.gstin:''} · ${b.description||''}</div></td><td class="num-cell">₹${fmt(b.amount)}</td><td class="num-cell">₹${fmt(b.gstAmount)}</td></tr>`; }).join('')}
      <tr style="font-weight:700;border-top:2px solid var(--ink)"><td>Total ITC</td><td class="num-cell">₹${fmt(bills.reduce((s,b)=>s+b.amount,0))}</td><td class="num-cell">₹${fmt(bills.reduce((s,b)=>s+b.gstAmount,0))}</td></tr></table></div>`
      : `<div class="empty"><div class="ic">%</div>No input-credit-bearing vendor bills yet. Tick "GST charged" when logging a vendor bill to start claiming ITC.</div>`;
  } else if(sr==='ledger'){
    body = `<div class="field"><label>Ledger</label><select id="gl_acc" onchange="go('gst','ledger')"><option value="GST Payable" ${window.__gstLdgAcc==='GST Input Credit'?'':'selected'}>GST Payable (Output)</option><option value="GST Input Credit" ${window.__gstLdgAcc==='GST Input Credit'?'selected':''}>GST Input Credit (ITC)</option></select></div>`;
    const accName = window.__gstLdgAcc || 'GST Payable';
    setTimeout(()=>{ const sel=document.getElementById('gl_acc'); if(sel){ sel.value=accName; sel.onchange=(e)=>{ window.__gstLdgAcc=e.target.value; render(); }; } },0);
    let bal=0;
    const rows = DB.vouchers.filter(v=>v.status==='approved' && v.entries.some(e=>e.account===accName)).sort((a,b)=>a.date.localeCompare(b.date))
      .map(v=>{ const e=v.entries.find(x=>x.account===accName); bal += (e.debit||0)-(e.credit||0);
        return `<tr><td>${v.date}</td><td>${v.narration||v.type}</td><td class="num-cell">${e.debit?'₹'+fmt(e.debit):''}</td><td class="num-cell">${e.credit?'₹'+fmt(e.credit):''}</td><td class="num-cell">₹${fmt(Math.abs(bal))}</td></tr>`; }).join('');
    body += `<div class="tbl-wrap"><table><tr><th>Date</th><th>Narration</th><th class="num-cell">Debit</th><th class="num-cell">Credit</th><th class="num-cell">Balance</th></tr>${rows||'<tr><td colspan=5 style="color:var(--ink-soft)">No approved entries</td></tr>'}</table></div>`;
  }
  const settingsLink = isReadOnly()? '' : `<div style="margin-bottom:12px;"><button class="btn btn-outline btn-sm" onclick="openGSTRatesModal()">Edit GST Rates by Charge Head</button></div>`;
  return `<div class="subtabs">${tabs.map(t=>`<button class="subtab ${sr===t[0]?'active':''}" onclick="go('gst','${t[0]}')">${t[1]}</button>`).join('')}</div>${settingsLink}<div class="card">${body}</div>
  <p style="font-size:11px;color:var(--ink-soft);margin-top:8px;">This module prepares return-ready figures from your books; it does not file GSTR-1/3B directly. Confirm applicability, rates, and reconciliation with your CA/GST advisor.</p>`;
}

function saveBankAccount(id){
  if(!canEdit()) return;
  const data = {
    id, type: document.getElementById('ba_type').value, bankName: document.getElementById('ba_name').value.trim(),
    accountNumber: document.getElementById('ba_num').value.trim(), fund: document.getElementById('ba_fund').value,

    maturityDate: document.getElementById('ba_maturity')? document.getElementById('ba_maturity').value : ''
  };
  if(!data.bankName){ toast('Bank name required'); return; }

}
function deleteBankAccount(id){
  if(!canEdit()) return;
  DB.bankAccounts = DB.bankAccounts.filter(b=>b.id!==id); save(); closeModal(); render();
}

function saveFlatOpening(){
  if(!canEdit()) return;
  const date = document.getElementById('fo_date').value || todayISO();
  let count=0, total=0;
  document.querySelectorAll('.fo_amt').forEach(inp=>{
    const amt = Number(inp.value); if(!amt||amt<=0) return;
    const flatId = inp.dataset.flat; const f = getFlat(flatId);
    const bill = {id:'B'+nextId('bill'), flatId, period:'OPENING-'+flatId, dueDate:date, items:[{head:'Opening Balance b/f', account:'Opening Balance Equity', amount:amt, gst:0}], subTotal:amt, gstTotal:0, total:amt, paid:0, status:'unpaid'};
    DB.bills.push(bill);
    addVoucher({type:'Journal', flatId, date, narration:`Opening balance b/f — ${flatLabel(f)}`,
      entries:[{account:'Maintenance Receivable',debit:amt,credit:0},{account:'Opening Balance Equity',debit:0,credit:amt}], ref:bill.id});
    count++; total+=amt;
  });
  if(!count){ toast('Enter at least one opening due'); return; }
  save(); closeModal(); toast(`${count} flat(s) posted — ₹${fmt(total)} total, awaiting approval`); render();
}
function openVendorOpeningModal(){
  if(!DB.vendors.length){ toast('Add vendors first'); go('vendors','list'); return; }
  openModal(`<div class="modal-head"><h2>Vendor Opening Dues</h2><button class="close-x" onclick="closeModal()">×</button></div>
    <p style="font-size:12px;color:var(--ink-soft);margin-bottom:10px;">Enter what the RWA already owed each vendor as on your cut-over date.</p>
    <div class="field"><label>As On Date</label><input id="vo_date" type="date" value="${todayISO()}"></div>
    <div class="tbl-wrap"><table><tr><th>Vendor</th><th class="num-cell">Opening Payable ₹</th></tr>
    ${DB.vendors.map(v=>`<tr><td style="font-size:12px;">${v.name}</td><td class="num-cell"><input type="number" class="vo_amt" data-vendor="${v.id}" style="width:90px;text-align:right;"></td></tr>`).join('')}
    </table></div>
    <button class="btn btn-primary btn-block" style="margin-top:12px;" onclick="saveVendorOpening()">Post Opening Dues</button>`);
