function saveVendorOpening(){
  if(!canEdit()) return;
  const date = document.getElementById('vo_date').value || todayISO();
  let count=0, total=0;
  document.querySelectorAll('.vo_amt').forEach(inp=>{
    const amt = Number(inp.value); if(!amt||amt<=0) return;
    const vendorId = inp.dataset.vendor; const v = getVendor(vendorId);
    const bid = 'VB'+nextId('vbill');
    DB.vendorBills.push({id:bid, vendorId, date, description:'Opening balance b/f', amount:amt, tdsSection:'None', tdsRate:0, tdsAmount:0, gstAmount:0, gstRate:0, netPayable:amt, paid:0, status:'unpaid'});
    addVoucher({type:'Journal', vendorId, date, narration:`Opening balance b/f — ${v.name}`,
      entries:[{account:'Opening Balance Equity',debit:amt,credit:0},{account:'Vendor Creditors',debit:0,credit:amt}], ref:bid});
    count++; total+=amt;
  });
  if(!count){ toast('Enter at least one opening due'); return; }
  save(); closeModal(); toast(`${count} vendor(s) posted — ₹${fmt(total)} total, awaiting approval`); render();
}
function openTBOpeningModal(){
  const accs = Object.keys(ACCOUNTS).filter(a=>a!=='Opening Balance Equity' && a!=='Maintenance Receivable' && a!=='Vendor Creditors');
  openModal(`<div class="modal-head"><h2>Opening Trial Balance</h2><button class="close-x" onclick="closeModal()">×</button></div>
    <p style="font-size:12px;color:var(--ink-soft);margin-bottom:10px;">Enter your Bank/Cash/Assets/Funds balances as on your cut-over date. Whatever doesn't naturally balance is plugged against Opening Balance Equity so this always posts as a clean double entry — review that figure before approving.</p>
    <div class="field"><label>As On Date</label><input id="tb_date" type="date" value="${todayISO()}"></div>
    <div class="tbl-wrap"><table><tr><th>Account</th><th class="num-cell">Debit</th><th class="num-cell">Credit</th></tr>
    ${accs.map(a=>`<tr><td style="font-size:12px;">${a}</td><td class="num-cell"><input type="number" class="tb_dr" data-acc="${a}" style="width:80px;text-align:right;" onchange="updateTBOpeningTotals()"></td><td class="num-cell"><input type="number" class="tb_cr" data-acc="${a}" style="width:80px;text-align:right;" onchange="updateTBOpeningTotals()"></td></tr>`).join('')}
    </table></div>
    <div id="tb_totals" style="margin-top:10px;font-size:12.5px;color:var(--ink-soft);"></div>
    <button class="btn btn-primary btn-block" style="margin-top:10px;" onclick="saveTBOpening()">Post Opening Trial Balance</button>`);
  setTimeout(updateTBOpeningTotals,0);
}
function updateTBOpeningTotals(){
  const dr = Array.from(document.querySelectorAll('.tb_dr')).reduce((s,i)=>s+(Number(i.value)||0),0);
  const cr = Array.from(document.querySelectorAll('.tb_cr')).reduce((s,i)=>s+(Number(i.value)||0),0);
  const diff = dr-cr;
  const el = document.getElementById('tb_totals'); if(!el) return;
  el.innerHTML = `Debit ₹${fmt(dr)} · Credit ₹${fmt(cr)} · ${diff===0? 'Balanced ✓' : `Difference ₹${fmt(Math.abs(diff))} will be plugged to Opening Balance Equity (${diff>0?'credit':'debit'} side)`}`;
}
function saveTBOpening(){
  if(!canEdit()) return;
  const date = document.getElementById('tb_date').value || todayISO();
  const entries = [];
  let dr=0, cr=0;
  document.querySelectorAll('.tb_dr').forEach(i=>{ const v=Number(i.value)||0; if(v>0){ entries.push({account:i.dataset.acc, debit:v, credit:0}); dr+=v; } });
  document.querySelectorAll('.tb_cr').forEach(i=>{ const v=Number(i.value)||0; if(v>0){ entries.push({account:i.dataset.acc, debit:0, credit:v}); cr+=v; } });
  if(!entries.length){ toast('Enter at least one opening balance'); return; }
  const diff = dr-cr;
  if(diff>0) entries.push({account:'Opening Balance Equity', debit:0, credit:diff});
  else if(diff<0) entries.push({account:'Opening Balance Equity', debit:-diff, credit:0});
  addVoucher({type:'Journal', date, narration:`Opening Trial Balance as at ${date}`, entries});
  save(); closeModal(); toast('Opening Trial Balance posted — awaiting approval'); render();
}

function saveChargeHead(id){
  if(!canEdit()) return;
  const name=document.getElementById('ch_name').value.trim(), rate=Number(document.getElementById('ch_rate').value);
  const mode=document.getElementById('ch_mode').value, account=document.getElementById('ch_acc').value;
  const gstApplicable=document.getElementById('ch_gst').checked, gstRate=Number(document.getElementById('ch_gstRate').value)||0;
  const meterType = mode==='meterReading'? document.getElementById('ch_meterType').value : undefined;
  const applicableCategories = document.getElementById('ch_scopeMode').value==='some'? Array.from(document.querySelectorAll('.ch_cat:checked')).map(c=>c.value) : [];
  if(!name||!rate){ toast('Enter name & rate'); return; }
  const data={id: id||nextId('head'), name, rate, mode, account, gstApplicable, gstRate, meterType, applicableCategories};
  const idx = DB.chargeHeads.findIndex(x=>x.id===id);
  if(idx>=0) DB.chargeHeads[idx]=data; else DB.chargeHeads.push(data);
  save(); closeModal(); toast('Charge head saved'); render();
}

function changePin(role){
  if(!canEdit()) return;
  const val = document.getElementById('pin_'+role).value.trim();
  if(!val || val.length<4){ toast('PIN must be at least 4 digits'); return; }
  DB.security.pins[role]=val; save(); document.getElementById('pin_'+role).value=''; toast(role+' PIN updated');

function exportData(){
  DB.lastBackupAt = nowTS(); save();
  const blob = new Blob([JSON.stringify(DB,null,2)],{type:'application/json'});
  const url = URL.createObjectURL(blob); const a=document.createElement('a');
  a.href=url; a.download=`smartrwa-backup-${todayISO()}.json`; a.click();
  toast('Backup downloaded'); render();
}
function importData(ev){
  if(!canEdit()) return;
  const file = ev.target.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = e=>{ try{ DB = JSON.parse(e.target.result); save(); toast('Backup restored'); go('dashboard'); }catch(err){ toast('Invalid file'); } };
  reader.readAsText(file);
}

/* ============ FULL DATA WIPE (MAKER-CHECKER) ============ */
function requestWipeAll(){
  if(!canEdit()) return;
  const reason = prompt('Reason for requesting a full data wipe (required):');
  if(!reason || !reason.trim()) return;
  DB.wipeRequest = {requestedBy: window.__currentRole, requestedAt: nowTS(), reason: reason.trim()};
  logAction('Wipe Requested', `Full data wipe requested — reason: ${reason.trim()}`);
  save(); render(); toast('Wipe requested — a different role must confirm');
}
function cancelWipeRequest(){
  if(!canEdit()) return;
  logAction('Wipe Request Cancelled', DB.wipeRequest? `Requested by ${DB.wipeRequest.requestedBy}` : '');
  DB.wipeRequest = null; save(); render(); toast('Wipe request cancelled');
}
function confirmWipeAll(){
  if(isReadOnly()){ toast('Auditors cannot confirm a wipe.'); return; }
  if(!DB.wipeRequest){ toast('No wipe request pending'); return; }
  if(DB.wipeRequest.requestedBy===window.__currentRole){ toast('A different role must confirm this.'); return; }
  if(!confirm('This will erase all data on this device (a restore point will be saved). Continue?')) return;
  const security = DB.security, society = DB.society, utilityRates = DB.utilityRates;
  try{ localStorage.setItem('smartrwa_v1_wipe_backup', JSON.stringify(DB)); }catch(e){}
  const wipeBackupAt = nowTS();
  DB = {
    society, security, utilityRates,
    flats:[], chargeHeads:defaultCharges(), vouchers:[], bills:[], complaints:[],
    vendors:[], vendorBills:[], employees:[], payrollRuns:[], assets:[], inventoryItems:[], inventoryTx:[],
    flatTypes:[], meterReadings:[], categoryRates:{}, consolidatedBills:[], towers:[], mainMeterReadings:[], bankAccounts:[],
    seq:{flat:1,bill:1,voucher:1,complaint:1,head:100,vendor:1,vbill:1,emp:1,payroll:1,asset:1,item:1,itx:1,ftype:1,meter:1,tower:1,mmr:1,cbill:1,bank:1},
    auditLog:[{id:1, ts:wipeBackupAt, role:window.__currentRole, action:'Full Wipe', detail:'All data wiped after maker-checker confirmation'}],
    wipeRequest:null, wipeBackupAt, lastBackupAt:null
  };
  save(); toast('All data wiped — restore point saved'); go('dashboard');
}
function restoreWipeBackup(){
  if(!canEdit()) return;
  const raw = localStorage.getItem('smartrwa_v1_wipe_backup');
  if(!raw){ toast('No wipe backup found'); return; }
  if(!confirm('Restore the data from before the last wipe? This replaces everything currently in the app.')) return;
  try{ DB = JSON.parse(raw); DB.wipeRequest=null; save(); toast('Restored from wipe backup'); go('dashboard'); }
  catch(e){ toast('Could not read backup'); }
}

    ${DB.chargeHeads.map(h=>`<tr><td style="font-size:12px;">${h.name}<div style="font-size:10.5px;color:var(--ink-soft);">${h.mode==='perArea'?'per sqft':h.mode==='perParking'?'per slot':h.mode==='meterReading'?'per unit ('+h.meterType+')':'flat rate'}</div></td><td class="num-cell"><input type="number" class="gr2_rate" data-head="${h.id}" value="${h.rate}" style="width:80px;text-align:right;"></td></tr>`).join('')}
    </table></div>
    ${isReadOnly()?'':'<button class="btn btn-primary btn-block" style="margin-top:12px;" onclick="saveGlobalRates()">Save Global Rates</button>'}`);
}
function saveGlobalRates(){
  if(!canEdit()) return;
  document.querySelectorAll('.gr2_rate').forEach(inp=>{
    const id = Number(inp.dataset.head); const h = DB.chargeHeads.find(x=>x.id===id); if(!h) return;
    h.rate = Number(inp.value)||0;
  });
  save(); closeModal(); toast('Global rates updated'); render();
}
function openGSTRatesModal(){
  openModal(`<div class="modal-head"><h2>GST Rates by Charge Type</h2><button class="close-x" onclick="closeModal()">×</button></div>
    <p style="font-size:12px;color:var(--ink-soft);margin-bottom:10px;">Set the GST rate to collect for each nature of charge. Untick "Apply" to bill that charge without GST.</p>
    <div class="tbl-wrap"><table><tr><th>Charge</th><th>Apply</th><th class="num-cell">Rate %</th></tr>
    ${DB.chargeHeads.map(h=>`<tr><td>${h.name}</td><td><input type="checkbox" class="gr_on" data-id="${h.id}" ${h.gstApplicable?'checked':''} style="width:auto"></td><td class="num-cell"><input type="number" class="gr_rate" data-id="${h.id}" value="${h.gstRate||18}" style="width:70px;text-align:right;"></td></tr>`).join('')}
    </table></div>
    ${isReadOnly()?'':'<button class="btn btn-primary btn-block" style="margin-top:12px;" onclick="saveGSTRates()">Save GST Rates</button>'}
    <p style="font-size:11px;color:var(--ink-soft);margin-top:8px;">Rates already applied to past bills are not changed retroactively — only new bills generated after saving use the updated rate.</p>`);
}
function saveGSTRates(){
  if(!canEdit()) return;
  document.querySelectorAll('.gr_on').forEach(chk=>{
    const id = Number(chk.dataset.id); const h = DB.chargeHeads.find(x=>x.id===id); if(!h) return;
    h.gstApplicable = chk.checked;
  });
  document.querySelectorAll('.gr_rate').forEach(inp=>{
    const id = Number(inp.dataset.id); const h = DB.chargeHeads.find(x=>x.id===id); if(!h) return;
    h.gstRate = Number(inp.value)||0;
  });
  save(); closeModal(); toast('GST rates updated'); render();
}

/* ============ HEALTH CHECK ============ */
function runHealthChecks(){
  const checks = [];
  const add=(ok,label,detail)=>checks.push({ok,label,detail});

  // Trial balance tallies for approved vouchers
  let totDr=0,totCr=0;
  DB.vouchers.filter(v=>v.status==='approved').forEach(v=> v.entries.forEach(e=>{ totDr+=e.debit||0; totCr+=e.credit||0; }));
  add(Math.abs(totDr-totCr)<1, 'Trial Balance tallies', `Debit ₹${fmt(totDr)} vs Credit ₹${fmt(totCr)}`);

  // Balance sheet tallies
  const assets = Object.keys(ACCOUNTS).filter(a=>ACCOUNTS[a]==='Asset').reduce((s,a)=>s+accBalance(a).net,0);
  const liab = Object.keys(ACCOUNTS).filter(a=>ACCOUNTS[a]==='Liability').reduce((s,a)=>s-accBalance(a).net,0);
  const incomeAccs = Object.keys(ACCOUNTS).filter(a=>ACCOUNTS[a]==='Income'), expAccs = Object.keys(ACCOUNTS).filter(a=>ACCOUNTS[a]==='Expense');
  const surplus = incomeAccs.reduce((s,a)=>s+accBalance(a).cr,0) - expAccs.reduce((s,a)=>s+accBalance(a).dr,0);
  add(Math.abs(assets-(liab+surplus))<1, 'Balance Sheet tallies', `Assets ₹${fmt(assets)} vs Liabilities+Surplus ₹${fmt(liab+surplus)}`);

  // Pending approvals aging
  const staleDays = 3;
  const stale = DB.vouchers.filter(v=>v.status==='pending' && (new Date()-new Date(v.makerAt))/86400000 > staleDays);
  add(stale.length===0, 'No stale pending approvals', stale.length? `${stale.length} entr${stale.length===1?'y':'ies'} pending for more than ${staleDays} days` : 'All pending entries raised recently');

  // Flats missing owner info
  const noOwner = DB.flats.filter(f=>!f.owner?.name);
  add(noOwner.length===0, 'All flats have owner details', noOwner.length? `${noOwner.length} flat(s) missing owner name` : 'Complete');

  // Duplicate flat numbers
  const seen={}; let dupes=0;
  DB.flats.forEach(f=>{ const k=f.tower+'|'+f.flatNo; if(seen[k]) dupes++; seen[k]=true; });
  add(dupes===0, 'No duplicate flat numbers', dupes? `${dupes} duplicate tower+flat combination(s) found` : 'Complete');

  // Bills without a linked voucher (data integrity)
  const orphanBills = DB.bills.filter(b=> !DB.vouchers.some(v=>v.ref===b.id));
  add(orphanBills.length===0, 'All bills have a matching accounting entry', orphanBills.length? `${orphanBills.length} bill(s) have no linked voucher` : 'Complete');

  // Negative stock
  const negStock = DB.inventoryItems.filter(it=>stockOnHand(it.id)<0);
  add(negStock.length===0, 'No negative stock balances', negStock.length? `${negStock.length} item(s) show negative stock — check entries` : 'Complete');

  // Vendor bills overdue > 60 days unpaid
  const overdueVendor = DB.vendorBills.filter(b=> (b.netPayable-b.paid)>0 && (new Date()-new Date(b.date))/86400000>60);
  add(overdueVendor.length===0, 'No vendor dues overdue beyond 60 days', overdueVendor.length? `${overdueVendor.length} vendor bill(s) unpaid for 60+ days` : 'Complete');

  // Charge heads pointing to unknown accounts
  const badHeads = DB.chargeHeads.filter(h=>!ACCOUNTS[h.account]);
  add(badHeads.length===0, 'Charge heads point to valid accounts', badHeads.length? `${badHeads.length} charge head(s) reference an unrecognised account` : 'Complete');

  // Meter-billed heads with no readings at all
  const meterHeadsNoReadings = DB.chargeHeads.filter(h=>h.mode==='meterReading' && !DB.meterReadings.some(r=>r.meterType===h.meterType));
  add(meterHeadsNoReadings.length===0, 'Meter-billed charges have readings on file', meterHeadsNoReadings.length? `${meterHeadsNoReadings.map(h=>h.name).join(', ')} — no meter readings entered yet` : 'Complete');

  return checks;
}
function openHealthCheckModal(){
  const checks = runHealthChecks();
  const passCount = checks.filter(c=>c.ok).length;
  const score = Math.round(passCount/checks.length*100);
  openModal(`<div class="modal-head"><h2>Health Check</h2><button class="close-x" onclick="closeModal()">×</button></div>
    <div class="stat ${score===100?'good':score>=70?'':'alert'}" style="margin-bottom:14px;"><div class="lbl">Overall Health</div><div class="val">${score}% (${passCount}/${checks.length})</div></div>
    ${checks.map(c=>`<div class="approval-row" style="padding:10px 12px;"><div style="display:flex;gap:8px;align-items:start;">
      <span style="font-size:15px;">${c.ok?'✅':'⚠️'}</span>
      <div><div style="font-weight:600;font-size:13.5px;">${c.label}</div><div style="font-size:12px;color:var(--ink-soft);">${c.detail}</div></div>
    </div></div>`).join('')}
    <p style="font-size:11px;color:var(--ink-soft);margin-top:6px;">Run this anytime from the ♡ icon at the top of the app.</p>`);
  logAction('Health Check', `Score ${score}% (${passCount}/${checks.length} checks passed)`);
}

/* ============ HELP ============ */

  const sections = [
    ['Getting Started', `1. Add your <b>Flat/Villa Types</b> and <b>Flats</b> under Setup / Flats (or bulk-import via CSV).<br>
      2. Set up <b>Charge Heads</b> — per sqft, fixed, per parking slot, or by meter reading — with GST where applicable.<br>
      3. Enter <b>Meter Readings</b> each period for Water/DG/Electricity before generating bills.<br>
      4. Use <b>Generate Bills</b> for the whole society, or <b>Bill One Flat</b> / <b>One-Time Charge</b> for individual cases.<br>
      5. Record <b>Receipts</b> as owners pay — they auto-adjust the oldest dues first.<br>
      6. Every accounting entry needs a second person to <b>Approve</b> it before it hits the ledger (maker-checker).`],
    ['Roles & Maker-Checker', `Only <b>Accountant</b>, <b>Treasurer</b>, and <b>Auditor</b> can sign in. Whoever raises a bill, receipt, voucher, vendor payment, payroll run, or asset entry cannot approve their own entry — a different role must review it under the <b>Approve</b> tab. Auditors can view everything but cannot create, edit, or approve anything — a full read-only audit trail.`],
    ['Billing & GST', `Charge heads can be billed per sqft, as a flat fixed amount, per parking slot, or by individual meter reading (Water/DG/Electricity). Add new charge types anytime under Setup → Charge Heads. GST can be switched on per charge type from Setup → Charge Heads → <b>GST Rates</b>. Confirm current GST applicability thresholds with your CA before enabling.`],
    ['Bulk Flat Import (CSV)', `From the Flats screen, tap <b>CSV Template</b> to download a spreadsheet with sample rows (opens fine in Excel or Google Sheets). Fill in your flats, keep the header row unchanged, then tap <b>Import CSV</b> to upload it back. The app checks each row for a Flat No., valid area, and duplicates before adding — you'll see a summary of what was added vs skipped and why.`],
    ['Health Check', `Tap the ♡ icon at the top anytime to run a diagnostic: it checks that your Trial Balance and Balance Sheet tally, flags stale pending approvals, flats without owners, negative stock, overdue vendor dues, and other data issues — so small mistakes get caught early.`],
    ['Data & Backup', `All data lives only on this device (offline-first). Export a backup regularly from Setup → Data, and store it somewhere safe (e.g. Google Drive/email to yourself). Import restores a full backup, replacing current data — use with care.`],
    ['Modules at a Glance', `<b>Flats</b> — owners, tenants, areas, parking · <b>Billing</b> — bills & meter readings · <b>Receipts</b> — payments received · <b>Vendors</b> — vendor bills, TDS, payments · <b>Payroll</b> — salary, PF, ESI · <b>Assets</b> — register & depreciation · <b>Stock</b> — inventory in/out · <b>Accounts</b> — vouchers & ledgers · <b>Approve</b> — maker-checker queue & audit log · <b>Issues</b> — complaints · <b>Reports</b> — Trial Balance, I&E, Balance Sheet, GST, Defaulters, Flat Ledger.`],
  ];
  return sections.map(([title,body])=>`<div class="card"><div class="section-title">${title}</div><p style="font-size:13px;line-height:1.6;">${body}</p></div>`).join('');
}

/* ============ THEME ============ */
function toggleTheme(){
  document.body.classList.toggle('dark');
  localStorage.setItem('smartrwa_theme', document.body.classList.contains('dark')?'dark':'light');
}
if(localStorage.getItem('smartrwa_theme')==='dark') document.body.classList.add('dark');

/* ============ ACCESS CONTROL ============ */
const ALLOWED_ROLES = ['Accountant','Treasurer','Auditor'];
let selectedRole = 'Accountant';
function selectRole(btn){
  selectedRole = btn.dataset.role;
  document.querySelectorAll('.role-opt').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('lockErr').textContent='';
}
function attemptLogin(){
  const pin = document.getElementById('lockPin').value.trim();
  if(DB.security.pins[selectedRole] === pin){
    sessionStorage.setItem('smartrwa_role', selectedRole);
    enterApp(selectedRole);
  } else {
    document.getElementById('lockErr').textContent = 'Incorrect PIN for '+selectedRole+'.';
  }
}
function logout(){
  sessionStorage.removeItem('smartrwa_role');
  document.getElementById('app').style.display='none';
  document.getElementById('lockscreen').style.display='flex';
  document.getElementById('lockPin').value='';
}
function enterApp(role){
  window.__currentRole = role;
  document.getElementById('lockscreen').style.display='none';
  document.getElementById('app').style.display='flex';
  document.getElementById('roleBadge').textContent = role;
  renderSidebar();
  go('dashboard');
}

/* ============ INIT ============ */
syncBankLedgerAccounts();
const savedRole = sessionStorage.getItem('smartrwa_role');
if(savedRole && ALLOWED_ROLES.includes(savedRole)){
  enterApp(savedRole);
} else {
  document.getElementById('lockscreen').style.display='flex';
}
